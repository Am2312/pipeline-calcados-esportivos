    <!-- Methodology -->
    <section class="chart-card" id="methodology-card">
        <h3 style="color:#021C45;font-size:15px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;margin:0 0 24px 0;">Methodology</h3>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:28px 48px;">

            <div>
                <p style="font-size:11px;font-weight:700;color:#021C45;text-transform:uppercase;letter-spacing:0.08em;margin:0 0 8px 0;border-bottom:1px solid #EBEBEB;padding-bottom:6px;">Data Sources</p>
                <p style="font-size:12px;color:#344F75;margin:0 0 6px 0;">5 channels tracked weekly:</p>
                <ul style="font-size:12px;color:#344F75;margin:0 0 8px 0;padding-left:18px;line-height:1.8;">
                    <li><strong>Olympikus</strong> — olympikus.com.br (official website)</li>
                    <li><strong>Mizuno</strong> — mizuno.com.br (official website)</li>
                    <li><strong>Centauro</strong> — centauro.com.br (marketplace)</li>
                    <li><strong>Direct</strong> — adidas.com.br + nike.com.br + asics.com.br + underarmour.com.br</li>
                    <li><strong>Netshoes</strong> — netshoes.com.br</li>
                </ul>
                <p style="font-size:11px;color:#9AA8BB;margin:0 0 6px 0;line-height:1.6;">
                    BQ tables: <code style="font-size:10px;background:#F7F8FA;padding:1px 4px;border-radius:4px;">olympikus_trusted</code>, <code style="font-size:10px;background:#F7F8FA;padding:1px 4px;border-radius:4px;">mizuno_trusted</code>, <code style="font-size:10px;background:#F7F8FA;padding:1px 4px;border-radius:4px;">centauro_trusted</code>, <code style="font-size:10px;background:#F7F8FA;padding:1px 4px;border-radius:4px;">under_armour_trusted</code>, <code style="font-size:10px;background:#F7F8FA;padding:1px 4px;border-radius:4px;">usr_andre_adidas_nike_product_snapshot_2026_05_15</code>, <code style="font-size:10px;background:#F7F8FA;padding:1px 4px;border-radius:4px;">usr_andre_netshoes_product_snapshot_2026_05_15</code>
                </p>
                <p style="font-size:11px;color:#9AA8BB;margin:0;line-height:1.6;">
                    <strong>UA Website source note:</strong> Adidas / Nike / Asics Website data comes from the scraper (started 2026-05-15). Under Armour Website data comes from <code style="font-size:10px;background:#F7F8FA;padding:1px 4px;border-radius:4px;">under_armour_trusted</code> (Aster, since 2024-04) for a long historical series consistent with Olympikus / Mizuno / Centauro. Filters (footwear-only via <code>subcategory_name = 'Calçados'</code>, available SKUs, prices &gt; 0) and cat mapping (DIRECT_CAT_MAP) are identical to the scraper path. Adidas / Nike / Asics Website still only shows from Mai/26 until those scrapers accumulate history (or a trusted table exists). For Olympikus and Mizuno, the same Aster trusted tables feed all 4 dashboard cards.
                </p>
            </div>

            <div>
                <p style="font-size:11px;font-weight:700;color:#021C45;text-transform:uppercase;letter-spacing:0.08em;margin:0 0 8px 0;border-bottom:1px solid #EBEBEB;padding-bottom:6px;">Data Grain</p>
                <ul style="font-size:12px;color:#344F75;margin:0;padding-left:18px;line-height:1.9;">
                    <li><strong>Direct / Netshoes:</strong> <strong>colorway level</strong> (model + color) — confirmed: Adidas, Nike, Asics and Under Armour do not vary price by size; all sizes of the same colorway share one price</li>
                    <li><strong>Olympikus / Mizuno:</strong> EAN level (model + color + size) via Aster pipelines</li>
                    <li><strong>Centauro:</strong> EAN level after seller deduplication — see below</li>
                </ul>
            </div>

            <div>
                <p style="font-size:11px;font-weight:700;color:#021C45;text-transform:uppercase;letter-spacing:0.08em;margin:0 0 8px 0;border-bottom:1px solid #EBEBEB;padding-bottom:6px;">Channel = Total (all 4 cards)</p>
                <p style="font-size:12px;color:#344F75;margin:0 0 6px 0;line-height:1.7;">When <strong>Channel = Total</strong> is selected (or shown as the Total line in Channel Breakdown), the four cards aggregate Website + Centauro + Netshoes using the <strong>same rule</strong>, so numbers can be compared head-to-head across cards.</p>
                <p style="font-size:12px;color:#344F75;margin:0 0 6px 0;line-height:1.7;font-family:Verdana,Geneva,sans-serif;text-align:center;background:#F7F8FA;padding:8px;border-radius:4px;">
                    Total<sub>brand, t</sub> = ( mean<sub>Website</sub> + mean<sub>Centauro</sub> + mean<sub>Netshoes</sub> ) / 3
                </p>
                <p style="font-size:12px;color:#344F75;margin:0 0 6px 0;line-height:1.7;"><strong>Two-stage aggregation:</strong></p>
                <ol style="font-size:12px;color:#344F75;margin:0 0 6px 0;padding-left:18px;line-height:1.8;">
                    <li><strong>Within each channel</strong> — SKU-weighted mean across all rows (categories, franchises) of that channel × brand × week.</li>
                    <li><strong>Across channels</strong> — simple arithmetic mean of the three channel-level means (each channel weighs 1/3).</li>
                </ol>
                <p style="font-size:12px;color:#344F75;margin:0 0 6px 0;line-height:1.7;"><strong>Why simple mean across channels (not SKU-weighted pool):</strong> each scraper counts SKUs at a different grain — Direct (Adidas/Nike/Asics/UA sites) counts colorways, Olympikus/Mizuno count EANs (model+color+size), Centauro counts EANs after seller dedup, Netshoes counts at colorway level. These row counts are <em>not directly comparable</em>: an EAN-grain channel can have ~5–10× more rows than a colorway-grain channel for the same real catalog. SKU-weighted pooling across channels would systematically over-weight finer-grain channels (mostly Centauro), so we use 1/3 each — a deliberately conservative, comparable rule.</p>
                <p style="font-size:12px;color:#344F75;margin:0 0 6px 0;line-height:1.7;"><strong>All 3 channels required:</strong> a week only enters the Total if it has data in <em>all</em> of Website, Centauro, and Netshoes. Since Netshoes coverage started 2026-05-15, Total time series will only start populating from that week onwards — historical Total will fill in as the series grows. For Price Pass-Through, "data in a channel" means the brand has at least one franchise with rows there.</p>
                <p style="font-size:12px;color:#344F75;margin:0;line-height:1.7;">Applied identically to: <strong>Average Price</strong>, <strong>% Discounted SKUs</strong>, <strong>Average Discount</strong>, <strong>Price Pass-Through</strong>. Same sport scope and category filters as the single-channel views.</p>
            </div>

            <div>
                <p style="font-size:11px;font-weight:700;color:#021C45;text-transform:uppercase;letter-spacing:0.08em;margin:0 0 8px 0;border-bottom:1px solid #EBEBEB;padding-bottom:6px;">% SKUs with Discount</p>
                <p style="font-size:12px;color:#344F75;margin:0 0 6px 0;line-height:1.7;"><code style="font-size:10px;background:#F7F8FA;padding:1px 4px;border-radius:4px;">COUNTIF(sale_price &lt; list_price) / COUNT(*)</code> at model level, by week and category.</p>
                <p style="font-size:12px;color:#344F75;margin:0;line-height:1.7;">A model is "discounted" when its sale price is strictly below its listed price.</p>
            </div>

            <div>
                <p style="font-size:11px;font-weight:700;color:#021C45;text-transform:uppercase;letter-spacing:0.08em;margin:0 0 8px 0;border-bottom:1px solid #EBEBEB;padding-bottom:6px;">Average Discount</p>
                <p style="font-size:12px;color:#344F75;margin:0 0 6px 0;line-height:1.7;">Simple mean of <code style="font-size:10px;background:#F7F8FA;padding:1px 4px;border-radius:4px;">(1 − sale/list)</code> across discounted models per week &amp; category.</p>
                <p style="font-size:12px;color:#344F75;margin:0;line-height:1.7;">When aggregating categories, weighted average by <code style="font-size:10px;background:#F7F8FA;padding:1px 4px;border-radius:4px;">n_disc</code> (number of discounted models).</p>
            </div>

            <div>
                <p style="font-size:11px;font-weight:700;color:#021C45;text-transform:uppercase;letter-spacing:0.08em;margin:0 0 8px 0;border-bottom:1px solid #EBEBEB;padding-bottom:6px;">Franchise Pass-Through</p>
                <p style="font-size:12px;color:#344F75;margin:0 0 6px 0;line-height:1.7;">Replaces the previous same-SKU view (deprecated 2026-05-22 night) with two complementary methods at the <strong>franchise</strong> level (e.g. Pegasus, Ultraboost, Corre 4, Gel-Nimbus). Franchises are mapped via a human-curated regex table (<code style="font-size:10px;background:#F7F8FA;padding:1px 4px;border-radius:4px;">franchise_mapping.py</code>) — ~458 franchises across the 6 brands, with ~80% catalog coverage on average.</p>
                <p style="font-size:12px;color:#344F75;margin:0 0 6px 0;line-height:1.7;"><strong>Method A — Average vs Average:</strong> for each (brand, franchise) and date <em>t</em>:</p>
                <p style="font-size:12px;color:#344F75;margin:0 0 6px 0;line-height:1.7;font-family:Verdana,Geneva,sans-serif;text-align:center;background:#F7F8FA;padding:8px;border-radius:4px;">
                    var<sub>w</sub>(franchise, t) = (AVG(price<sub>franchise, t</sub>) − AVG(price<sub>franchise, prev_window</sub>)) / AVG(price<sub>franchise, prev_window</sub>)
                </p>
                <p style="font-size:12px;color:#344F75;margin:0 0 6px 0;line-height:1.7;">Underlying SKU sets in <em>t</em> and the reference window can be different — the comparison is between catalog snapshots of the same franchise label.</p>
                <p style="font-size:12px;color:#344F75;margin:0 0 6px 0;line-height:1.7;"><strong>Method B — Generation vs Generation:</strong> identifies the most-recent generation of each franchise (e.g. Pegasus 42, Corre 5) by <strong>first-seen date in the catalog</strong> (not by numeric label — handles Adidas Ultraboost 22 → 5 renumbering). Compares the latest gen at <em>t</em> against the gen that was most-recent at the reference window start.</p>
                <p style="font-size:12px;color:#344F75;margin:0 0 6px 0;line-height:1.7;">Same 5 windows as before: WoW (prev ISO week) / MoM (prev cal month) / QoQ (month 3 back) / YoY (same month prev year) / YTD (Dec prev year). Computed independently for <strong>sale</strong> and <strong>list</strong>.</p>
                <p style="font-size:12px;color:#344F75;margin:0 0 6px 0;line-height:1.7;"><strong>Sport scope filter:</strong> uses the curated <code style="font-size:10px;background:#F7F8FA;padding:1px 4px;border-radius:4px;">sport</code> field per franchise (corrida / training / trail / casual / etc.) — divergent from other dashboard cards which filter by raw BQ category. The tradeoff: stable franchise classification at the cost of letting through ~5% of SKUs cadastered with inconsistent categories on the source.</p>
                <p style="font-size:12px;color:#344F75;margin:0 0 6px 0;line-height:1.7;"><strong>Views available:</strong></p>
                <ul style="font-size:12px;color:#344F75;margin:0 0 6px 0;padding-left:18px;line-height:1.8;">
                    <li><strong>Company Comparison</strong> — one line per brand at the selected channel</li>
                    <li><strong>Channel Breakdown</strong> — one line per channel for the selected brand</li>
                    <li><strong>Model Breakdown</strong> — for the selected brand × channel, plots the top 8 franchises by SKU volume (one line per franchise)</li>
                </ul>
                <p style="font-size:12px;color:#344F75;margin:0 0 6px 0;line-height:1.7;"><strong>Aggregation rule (Company Comparison and Channel Breakdown):</strong> the brand-level (or channel-level) number is the <strong>SKU-weighted mean of the per-franchise Δs</strong>, not the Δ of the SKU-weighted average price. Each franchise enters the aggregate proportional to its SKU count, regardless of price level. This answers <em>"on average, by how much did franchises within this brand×channel move?"</em>, treating each franchise as a unit of catalog behaviour.</p>
                <p style="font-size:12px;color:#344F75;margin:0 0 6px 0;line-height:1.7;">Formally, for a (brand, channel, week):</p>
                <p style="font-size:12px;color:#344F75;margin:0 0 6px 0;line-height:1.7;font-family:Verdana,Geneva,sans-serif;text-align:center;background:#F7F8FA;padding:8px;border-radius:4px;">
                    Δ<sub>brand, channel, t</sub> = Σ<sub>f</sub> (Δ<sub>f, t</sub> × n_SKUs<sub>f, t</sub>) / Σ<sub>f</sub> n_SKUs<sub>f, t</sub>
                </p>
                <p style="font-size:12px;color:#344F75;margin:0 0 6px 0;line-height:1.7;">Note that this is not algebraically equivalent to recomputing Δ from a basket-level weighted-mean price series — the two converge when most volume sits on franchises moving in the same direction, and can diverge when a small franchise moves sharply against the dominant ones. Model Breakdown shows the per-franchise Δs directly (no aggregation), so it is unaffected.</p>
                <p style="font-size:11px;color:#9AA8BB;margin:0;line-height:1.6;"><strong>Coverage:</strong> Asics 93%, Adidas 85%, Olympikus 80%, Mizuno 80%, Under Armour 75%, Nike 67% (Nike has dispersed Jordan sub-models). Franchises with peak weekly n_SKUs &lt; 100 are excluded for statistical robustness — 171 franchises kept of 458 detected.</p>
            </div>

            <div>
                <p style="font-size:11px;font-weight:700;color:#021C45;text-transform:uppercase;letter-spacing:0.08em;margin:0 0 8px 0;border-bottom:1px solid #EBEBEB;padding-bottom:6px;">Sport Category Filter</p>
                <p style="font-size:12px;color:#344F75;margin:0 0 6px 0;line-height:1.7;">Each channel uses its own naming convention, mapped to three buckets:</p>
                <ul style="font-size:12px;color:#344F75;margin:0 0 6px 0;padding-left:18px;line-height:1.9;">
                    <li><strong>Corrida</strong> — running only (Corrida / Running / Corrida·Caminhada)</li>
                    <li><strong>Performance</strong> — Corrida + Treino + Academia/Fitness + Trilha (channel-specific name variations)</li>
                    <li><strong>All</strong> — all footwear categories</li>
                </ul>
                <p style="font-size:11px;color:#9AA8BB;margin:0;line-height:1.6;">Raw category names differ by source: Direct uses VTEX/API sport names (Running, SportStyle, Treino &amp; Academia…); Netshoes uses its own taxonomy (Corrida, Treino, Trail Running, Fitness e Musculação…). Each is mapped individually in <code style="font-size:10px;background:#F7F8FA;padding:1px 4px;border-radius:4px;">SPORT_CATS</code>.</p>
            </div>

            <div>
                <p style="font-size:11px;font-weight:700;color:#021C45;text-transform:uppercase;letter-spacing:0.08em;margin:0 0 8px 0;border-bottom:1px solid #EBEBEB;padding-bottom:6px;">Centauro Marketplace</p>
                <p style="font-size:12px;color:#344F75;margin:0 0 6px 0;line-height:1.7;">The same product (EAN = model + size) can be listed by multiple third-party sellers at different prices.</p>
                <p style="font-size:12px;color:#344F75;margin:0 0 6px 0;line-height:1.7;"><strong>Methodology:</strong> for each EAN on each date, keep only the <em>lowest available price</em>.</p>
                <p style="font-size:12px;color:#344F75;margin:0;line-height:1.7;"><strong>Rationale:</strong> measures the discount level present for each brand in the market — if a shoe is available at a discount anywhere on the site, that product is discounted.</p>
            </div>

            <div>
                <p style="font-size:11px;font-weight:700;color:#021C45;text-transform:uppercase;letter-spacing:0.08em;margin:0 0 8px 0;border-bottom:1px solid #EBEBEB;padding-bottom:6px;">Week Convention</p>
                <ul style="font-size:12px;color:#344F75;margin:0;padding-left:18px;line-height:1.9;">
                    <li>All four chart cards use the same convention: <strong>week key = Sunday at the end of the ISO Mon–Sun week</strong> — e.g. W21 2026 = 2026-05-24 (Mon 18 May → Sun 24 May).</li>
                    <li><strong>Olympikus / Mizuno (Aster):</strong> daily collection — week aggregates all 7 days</li>
                    <li><strong>Direct (Adidas/Nike/Asics/UA):</strong> daily scraper 07:00 BRT — week aggregates all daily snapshots collected Mon–Sun</li>
                    <li><strong>Netshoes (own scraper):</strong> daily collection — week aggregates all available days</li>
                    <li><strong>Centauro (Aster):</strong> <span style="color:#C8102E;font-weight:600;">Thursday snapshot only — 1×/week</span>. The "week" datapoint for Centauro is in fact a single Thursday snapshot. When that Thursday is missed by the source, the entire week is empty (no fallback to other days).</li>
                </ul>
                <p style="font-size:11px;color:#9AA8BB;margin:8px 0 0 0;line-height:1.6;"><strong>Pipeline correction (2026-05-26):</strong> the Franchise Pass-Through pipeline previously anchored weeks to the Sunday at the <em>start</em> of a Sun–Sat span, which placed Centauro Thursday data one ISO week behind the other three cards. The pipeline was corrected on 2026-05-26 to use the Sunday at the <em>end</em> of the ISO Mon–Sun week, matching all other charts. Historical data was fully regenerated.</p>
                <p style="font-size:11px;color:#9AA8BB;margin:8px 0 0 0;line-height:1.6;"><strong>Centauro data gaps:</strong> (a) <em>structural</em> — Black Friday and any weekend event are never captured since collection is Thursday-only; (b) <em>historical</em> — no Centauro data exists in the source between 2023-10-01 and 2025-07-27 (~21 months); (c) <em>sporadic missed Thursdays</em>: 2025-09-18, 2025-10-02, 2025-10-09, 2025-10-30 (whole weeks therefore absent). Affects Asics-, Nike- and Adidas-Centauro series. Monthly aggregates ignore empty weeks rather than treating them as zero; October-2025 averages are based on only 2 weeks (16 + 23).</p>
            </div>

            <div>
                <p style="font-size:11px;font-weight:700;color:#021C45;text-transform:uppercase;letter-spacing:0.08em;margin:0 0 8px 0;border-bottom:1px solid #EBEBEB;padding-bottom:6px;">Product Scope — Direct Channel</p>
                <p style="font-size:12px;color:#344F75;margin:0 0 6px 0;line-height:1.7;">Only <strong>footwear</strong> is tracked. Each brand's API was filtered to exclude apparel, accessories and equipment:</p>
                <ul style="font-size:12px;color:#344F75;margin:0;padding-left:18px;line-height:1.9;">
                    <li><strong>Adidas:</strong> <code style="font-size:10px;background:#F7F8FA;padding:1px 4px;border-radius:4px;">sport_pt_br</code> facet in the Search API returns footwear-dominant results by default</li>
                    <li><strong>Nike:</strong> <code style="font-size:10px;background:#F7F8FA;padding:1px 4px;border-radius:4px;">/calcados/</code> URL segment restricts to footwear category</li>
                    <li><strong>Asics:</strong> allowlist filter on VTEX sport category (Running, SportStyle, Tennis, Skateboarding, Quadra, Trilha, Vôlei, Infantil, Calçados) — excludes Camisetas, Leggings, Meias, Bolsas etc.</li>
                    <li><strong>Under Armour:</strong> VTEX category path filter <code style="font-size:10px;background:#F7F8FA;padding:1px 4px;border-radius:4px;">/Gênero/Calçados/Sport/</code> — the VTEX facet for "Calçados" is non-functional so UA returns all 2 000+ products; footwear is identified post-fetch by path depth</li>
                </ul>
                <p style="font-size:11px;color:#9AA8BB;margin:6px 0 0 0;line-height:1.6;">Historical note: before 2026-05-21 the Asics and UA scrapers lacked this filter. W20 (2026-05-17) was the first contaminated week; BQ history was cleaned and JS arrays corrected on 2026-05-21.</p>
            </div>

            <div>
                <p style="font-size:11px;font-weight:700;color:#021C45;text-transform:uppercase;letter-spacing:0.08em;margin:0 0 8px 0;border-bottom:1px solid #EBEBEB;padding-bottom:6px;">Product Scope — Centauro, Olympikus, Mizuno (Aster)</p>
                <ul style="font-size:12px;color:#344F75;margin:0;padding-left:18px;line-height:1.9;">
                    <li><strong>Centauro:</strong> filtered to <code style="font-size:10px;background:#F7F8FA;padding:1px 4px;border-radius:4px;">grandparent_group = 'Calçados'</code>. Apparel, accessories, socks and equipment are excluded. EAN-level dedup keeps each product 1× (handles marketplace seller duplicates: Centauro-direct preferred, else lowest-price marketplace listing).</li>
                    <li><strong>Olympikus:</strong> filtered to <code style="font-size:10px;background:#F7F8FA;padding:1px 4px;border-radius:4px;">subcategory_name IN ('Calçados', 'Tênis')</code>. Model-level dedup by <code style="font-size:10px;background:#F7F8FA;padding:1px 4px;border-radius:4px;">grandparent_id</code>.</li>
                    <li><strong>Mizuno:</strong> filtered to <code style="font-size:10px;background:#F7F8FA;padding:1px 4px;border-radius:4px;">subcategory_name = 'Calçados'</code>. Model-level dedup by <code style="font-size:10px;background:#F7F8FA;padding:1px 4px;border-radius:4px;">grandparent_id</code>.</li>
                </ul>
                <p style="font-size:11px;color:#9AA8BB;margin:6px 0 0 0;line-height:1.6;">Historical note: before 2026-05-22 the Centauro queries lacked the footwear filter and were mixing footwear with apparel/accessories. Impact on the last closed week was up to <strong>+6.8 pp</strong> on Adidas % SKUs discounted (37.3% → 44.0% footwear-only). All historical Centauro weeks were re-run with the new filter on 2026-05-22; for 2022 weeks the source's <code style="font-size:10px;background:#F7F8FA;padding:1px 4px;border-radius:4px;">child_is_available</code> field was not yet populated, so the regen accepted NULL as "available" — a slightly looser definition than 2025+ data.</p>
            </div>

            <div>
                <p style="font-size:11px;font-weight:700;color:#021C45;text-transform:uppercase;letter-spacing:0.08em;margin:0 0 8px 0;border-bottom:1px solid #EBEBEB;padding-bottom:6px;">Dedup Granularity by Channel</p>
                <ul style="font-size:12px;color:#344F75;margin:0;padding-left:18px;line-height:1.9;">
                    <li><strong>Direct (Adidas/Nike/Asics/UA):</strong> model-level (<code style="font-size:10px;background:#F7F8FA;padding:1px 4px;border-radius:4px;">grandparent_id</code>)</li>
                    <li><strong>Netshoes:</strong> model-level (<code style="font-size:10px;background:#F7F8FA;padding:1px 4px;border-radius:4px;">product_code</code>)</li>
                    <li><strong>Olympikus / Mizuno:</strong> model-level (<code style="font-size:10px;background:#F7F8FA;padding:1px 4px;border-radius:4px;">grandparent_id</code>)</li>
                    <li><strong>Centauro:</strong> EAN-level (<code style="font-size:10px;background:#F7F8FA;padding:1px 4px;border-radius:4px;">child_ean</code>) — necessary to dedup the same physical product listed by multiple marketplace sellers. Slightly more granular than other channels (sneakers with many sizes/colors weight more in the average), but a unit-comparable definition would require an additional model-level rollup the source does not currently support cleanly.</li>
                </ul>
                <p style="font-size:11px;color:#9AA8BB;margin:6px 0 0 0;line-height:1.6;">Verified 2026-05-22 that Olympikus and Mizuno give the same discount to all sizes of the same model 99.77% of the time, so <code style="font-size:10px;background:#F7F8FA;padding:1px 4px;border-radius:4px;">MAX(child_pct_discount)</code> per model is equivalent to MIN or AVG — no bias introduced by aggregating sizes into a model identifier.</p>
            </div>

        </div>
    </section>

</div>
