function cagedJobsTableLookup() {
    return new Map(cagedJobsRowsForGrain(cagedJobsTableState.grain).map(row => [row.key, row]));
}

function cagedJobsPreviousKey(row, type) {
    if (type === 'yoy') {
        if (cagedJobsTableState.grain === 'monthly') return periodKey(row.year - 1, row.month);
        if (cagedJobsTableState.grain === 'quarterly') return `${row.year - 1}-Q${row.quarter}`;
        return String(row.year - 1);
    }
    if (type === 'mom') {
        if (cagedJobsTableState.grain !== 'monthly') return null;
        const prevMonth = row.month === 1 ? 12 : row.month - 1;
        const prevYear = row.month === 1 ? row.year - 1 : row.year;
        return periodKey(prevYear, prevMonth);
    }
    if (type === 'qoq') {
        if (cagedJobsTableState.grain === 'monthly') {
            const date = new Date(row.year, row.month - 4, 1);
            return periodKey(date.getFullYear(), date.getMonth() + 1);
        }
        if (cagedJobsTableState.grain === 'quarterly') {
            const prevQuarter = row.quarter === 1 ? 4 : row.quarter - 1;
            const prevYear = row.quarter === 1 ? row.year - 1 : row.year;
            return `${prevYear}-Q${prevQuarter}`;
        }
    }
    return null;
}

function cagedJobsTableVariation(row, type, lookup) {
    const prevKey = cagedJobsPreviousKey(row, type);
    const prev = prevKey ? lookup.get(prevKey) : null;
    const value = Number(row?.value);
    const prevValue = Number(prev?.value);
    return prevValue ? (value / prevValue - 1) : null;
}

function cagedJobsTableCagr(rows) {
    if (rows.length < 2) return null;
    const first = rows[0];
    const last = rows[rows.length - 1];
    const firstValue = Number(first?.value);
    const lastValue = Number(last?.value);
    if (!firstValue || !lastValue) return null;
    let years = Number(last.year) - Number(first.year);
    if (cagedJobsTableState.grain === 'monthly') years += (Number(last.month) - Number(first.month)) / 12;
    if (cagedJobsTableState.grain === 'quarterly') years += (Number(last.quarter) - Number(first.quarter)) / 4;
    if (!(years > 0)) return null;
    return Math.pow(lastValue / firstValue, 1 / years) - 1;
}

function cagedJobsTablePctCell(value) {
    return sectorPctCell(value);
}

function renderCagedJobsTable() {
    const rows = cagedJobsTableRows();
    const lookup = cagedJobsTableLookup();
    const cagr = cagedJobsTableCagr(rows);
    const varRow = (label, type) => `<tr class="yoy-row">
        <td class="metric-cell" style="padding-left:26px;color:${C.azulEscuro};font-weight:400;">${label}</td>
        ${rows.map(row => cagedJobsTablePctCell(cagedJobsTableVariation(row, type, lookup))).join('')}
        <td class="cagr-cell" style="border-bottom:0;color:transparent;font-weight:400;"></td>
    </tr>`;
    const variationRows = [
        varRow('YoY', 'yoy'),
        cagedJobsTableState.grain === 'monthly' ? varRow('MoM', 'mom') : '',
        cagedJobsTableState.grain !== 'annual' ? varRow('QoQ', 'qoq') : '',
    ].join('');
    return `<div class="imports-table-scroll" style="margin-top:18px;">
        <table class="sector-breakdown-table">
            <thead>
                <tr>
                    <th class="metric-cell head-sticky"></th>

                    <td class="cagr-cell" style="color:${Number.isFinite(cagr) && cagr < 0 ? '#B0002A' : C.azulEscuro};">${Number.isFinite(cagr) ? fmtPctEN(cagr, 0) : 'n.m.'}</td>
                </tr>
                ${variationRows}
            </tbody>
        </table>
    </div>`;
}

function vulcabrasVolumeRows() {
    return (window.VULCABRAS_VOLUME_DATA?.rows || [])
        .map(row => ({
            key: row.key,
            label: row.label,
            year: Number(row.year),
            quarter: Number(row.quarter),
            value: Number(row.athletic_footwear_volume_k_pairs)
        }))
        .filter(row => row.key && Number.isFinite(row.value))
        .sort((a, b) => a.key.localeCompare(b.key));
}

function quarterKeyParts(key) {
    const match = String(key || '').match(/^(\d{4})-Q([1-4])$/);
    if (!match) return null;
    return { year: Number(match[1]), quarter: Number(match[2]) };
}

function addQuarterKey(year, quarter, quartersForward=0) {
    const d = new Date(year, (quarter - 1) * 3 + Number(quartersForward || 0) * 3, 1);
    return `${d.getFullYear()}-Q${quarterOf(d.getMonth() + 1)}`;
}

function cagedVolumeYoyQuarterlyRows() {
    const jobsRows = cagedJobsQuarterlyRows();
    const volumeRows = vulcabrasVolumeRows();
    const volumeByKey = new Map(volumeRows.map(row => [row.key, row]));
    const volumeYoyByKey = new Map();
    volumeRows.filter(row => row.key >= '2021-Q1' && row.key <= '2026-Q1').forEach(row => {
        const prevVolume = volumeByKey.get(`${row.year - 1}-Q${row.quarter}`);
        volumeYoyByKey.set(row.key, prevVolume?.value ? (row.value / prevVolume.value - 1) * 100 : null);
    });
    const jobsYoyByDisplayKey = new Map();
    jobsRows.filter(row => row.key >= '2021-Q1' && Number.isFinite(row.yoy)).forEach(row => {
        jobsYoyByDisplayKey.set(addQuarterKey(row.year, row.quarter, cagedVolumeYoyState.shiftQuarters), row.yoy);
    });
    const keys = Array.from(new Set([...volumeYoyByKey.keys(), ...jobsYoyByDisplayKey.keys()]))
        .filter(key => key >= '2021-Q1')
        .sort((a, b) => a.localeCompare(b));
    return keys.map(key => {
        const parts = quarterKeyParts(key);
        return {
            key,
            label: quarterLabel(parts.year, parts.quarter),
            year: parts.year,
            quarter: parts.quarter,
            jobsYoy: jobsYoyByDisplayKey.has(key) ? jobsYoyByDisplayKey.get(key) : null,
            volumeYoy: volumeYoyByKey.has(key) ? volumeYoyByKey.get(key) : null
        };
    });
}

function cagedVolumeYoyLtmRows() {
    const jobsRows = cagedJobsQuarterlyRows();
    const volumeRows = vulcabrasVolumeRows();
    const jobsByKey = new Map(jobsRows.map(row => [row.key, row]));
    const volumeByKey = new Map(volumeRows.map(row => [row.key, row]));
    const windowKeys = row => {
        const keys = [];
        for (let i = 3; i >= 0; i--) {
            const d = new Date(row.year, (row.quarter - 1) * 3 - i * 3, 1);
            keys.push(`${d.getFullYear()}-Q${quarterOf(d.getMonth() + 1)}`);
        }
        return keys;
    };
    const priorYearKeys = keys => keys.map(key => {
        const [year, q] = key.split('-Q');
        return `${Number(year) - 1}-Q${q}`;
    });
    const volumeYoyByKey = new Map();
    volumeRows.filter(row => row.key >= '2021-Q1' && row.key <= '2026-Q1').forEach(row => {
        const quarterKeys = windowKeys(row);
        const prevKeys = priorYearKeys(quarterKeys);
        const volumeWindow = quarterKeys.map(key => volumeByKey.get(key)).filter(Boolean);
        const prevVolumeWindow = prevKeys.map(key => volumeByKey.get(key)).filter(Boolean);
        const volumeValue = volumeWindow.length === 4 ? volumeWindow.reduce((sum, item) => sum + item.value, 0) : null;
        const prevVolumeValue = prevVolumeWindow.length === 4 ? prevVolumeWindow.reduce((sum, item) => sum + item.value, 0) : null;
        volumeYoyByKey.set(row.key, prevVolumeValue ? (volumeValue / prevVolumeValue - 1) * 100 : null);
    });
    const jobsYoyByDisplayKey = new Map();
    jobsRows.filter(row => row.key >= '2021-Q1').forEach(row => {
        const jobQuarterKeys = windowKeys(row);
        const prevJobKeys = priorYearKeys(jobQuarterKeys);
        const jobsWindow = jobQuarterKeys.map(key => jobsByKey.get(key)).filter(Boolean);
        const prevJobsWindow = prevJobKeys.map(key => jobsByKey.get(key)).filter(Boolean);
        const jobsValue = jobsWindow.length === 4 ? jobsWindow.reduce((sum, item) => sum + item.value, 0) / 4 : null;
        const prevJobsValue = prevJobsWindow.length === 4 ? prevJobsWindow.reduce((sum, item) => sum + item.value, 0) / 4 : null;
        if (!prevJobsValue) return;
        jobsYoyByDisplayKey.set(addQuarterKey(row.year, row.quarter, cagedVolumeYoyState.shiftQuarters), (jobsValue / prevJobsValue - 1) * 100);
    });
    const keys = Array.from(new Set([...volumeYoyByKey.keys(), ...jobsYoyByDisplayKey.keys()]))
        .filter(key => key >= '2021-Q1')
        .sort((a, b) => a.localeCompare(b));
    return keys.map(key => {
        const parts = quarterKeyParts(key);
        return {
            key,
            label: quarterLabel(parts.year, parts.quarter),
            year: parts.year,
            quarter: parts.quarter,
            jobsYoy: jobsYoyByDisplayKey.has(key) ? jobsYoyByDisplayKey.get(key) : null,
            volumeYoy: volumeYoyByKey.has(key) ? volumeYoyByKey.get(key) : null
        };
    });
}

function shiftQuarterKey(year, quarter, quartersBack=0) {
    const d = new Date(year, (quarter - 1) * 3 - Number(quartersBack || 0) * 3, 1);
    return `${d.getFullYear()}-Q${quarterOf(d.getMonth() + 1)}`;
}

function cagedVolumeYoyRows() {
    ensureCagedVolumeYoyRange();
    return (cagedVolumeYoyState.mode === 'ltm' ? cagedVolumeYoyLtmRows() : cagedVolumeYoyQuarterlyRows())
        .filter(row => row.key >= cagedVolumeYoyState.from && row.key <= cagedVolumeYoyState.to);
}

function cagedVolumeYoyAllRows() {
    return cagedVolumeYoyState.mode === 'ltm' ? cagedVolumeYoyLtmRows() : cagedVolumeYoyQuarterlyRows();
}

function ensureCagedVolumeYoyRange() {
    const rows = cagedVolumeYoyAllRows();
    if (!rows.length) return;
    const keys = rows.map(row => row.key);
    const defaultFrom = keys.includes('2023-Q1') ? '2023-Q1' : keys[0];
    const defaultTo = cagedVolumeYoyState.shiftQuarters > 0 ? keys[keys.length - 1] : (keys.includes('2026-Q1') ? '2026-Q1' : keys[keys.length - 1]);
    if (!cagedVolumeYoyState.from || !keys.includes(cagedVolumeYoyState.from)) cagedVolumeYoyState.from = defaultFrom;
    if (!cagedVolumeYoyState.to || !keys.includes(cagedVolumeYoyState.to)) cagedVolumeYoyState.to = defaultTo;
    if (keys.indexOf(cagedVolumeYoyState.from) > keys.indexOf(cagedVolumeYoyState.to)) {
        [cagedVolumeYoyState.from, cagedVolumeYoyState.to] = [cagedVolumeYoyState.to, cagedVolumeYoyState.from];
    }
}

function updateCagedVolumeYoyLegendStates() {
    if (!cagedVolumeYoyChartInstance) return;
    document.querySelectorAll('#caged-volume-yoy-card .chart-legend-item[data-dataset-index]').forEach(item => {
        const idx = Number(item.dataset.datasetIndex);
        item.classList.toggle('is-hidden', !cagedVolumeYoyChartInstance.isDatasetVisible(idx));
    });
}

function bindCagedVolumeYoyLegendToggles() {
    document.querySelectorAll('#caged-volume-yoy-card .chart-legend-item[data-dataset-index]').forEach(item => {
        const toggle = () => {
            const idx = Number(item.dataset.datasetIndex);
            cagedVolumeYoyChartInstance.setDatasetVisibility(idx, !cagedVolumeYoyChartInstance.isDatasetVisible(idx));
            cagedVolumeYoyChartInstance.update();
            updateCagedVolumeYoyLegendStates();
        };
        item.addEventListener('click', toggle);
        item.addEventListener('keydown', event => {
            if (event.key !== 'Enter' && event.key !== ' ') return;
            event.preventDefault();
            toggle();
        });
    });
    updateCagedVolumeYoyLegendStates();
}

function cagedVolumeYoyAxis(values) {
    const valid = values.filter(Number.isFinite);
    if (!valid.length) return { min: -10, max: 10, step: 5 };
    let min = Math.min(...valid, 0);
    let max = Math.max(...valid, 0);
    const span = Math.max(max - min, 10);
    const pad = Math.max(span * 0.12, 2);
    const step = 5;
    return {
        min: Math.floor((min - pad) / step) * step,
        max: Math.ceil((max + pad) / step) * step,
        step
    };
}

function renderCagedVolumeYoyChart() {
    if (cagedVolumeYoyChartInstance) { cagedVolumeYoyChartInstance.destroy(); cagedVolumeYoyChartInstance = null; }
    const el = document.getElementById('caged-volume-yoy-chart');
    if (!el) return;
    const rows = cagedVolumeYoyRows();
    const jobsYoy = rows.map(row => row.jobsYoy);
    const volumeYoy = rows.map(row => row.volumeYoy);
    const axis = cagedVolumeYoyAxis([...jobsYoy, ...volumeYoy]);
    const labelIndices = rows.map((row, i) => i);
    const labelPlugin = {
        id: 'cagedVolumeYoyLabels',
        beforeDatasetsDraw(chart) {
            const xScale = chart.scales.x;
            const yScale = chart.scales.y;
            if (!xScale || !yScale) return;
            const y = yScale.bottom;
            const ctx = chart.ctx;
            ctx.save();
            ctx.strokeStyle = '#CFD8E3';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(chart.chartArea.left, y);
            ctx.lineTo(chart.chartArea.right, y);
            ctx.stroke();
            ctx.restore();
        },
        afterDatasetsDraw(chart) {
            const { ctx, chartArea } = chart;
            const BH = 18, GAP = 2;
            const items = [];
            ctx.save();
            ctx.font = '700 10px Verdana';
            chart.data.datasets.forEach((dataset, datasetIndex) => {
                if (!chart.isDatasetVisible(datasetIndex)) return;
                const meta = chart.getDatasetMeta(datasetIndex);
                labelIndices.forEach(i => {
                    const value = dataset.data[i];
                    const point = meta.data[i];
                    if (!point || !Number.isFinite(value)) return;
                    const text = cagedPctNumber(value, 0);
                    const bw = ctx.measureText(text).width + 12;
                    items.push({
                        text,
                        color: dataset.borderColor,
                        x: point.x,
                        y: point.y,
                        bw,
                        bh: BH,
                        datasetIndex,
                        dataIndex: i
                    });
                });
            });
            ctx.restore();
            const draw = item => {
                const x = Math.max(2, Math.min(item.x - item.bw / 2, chart.width - item.bw - 2));
                const y = Math.max(chartArea.top + 2, Math.min(item.y - item.bh / 2, chartArea.bottom - item.bh - 2));
                ctx.save();
                ctx.fillStyle = item.color;
                roundedRect(ctx, x, y, item.bw, item.bh, 3);
                ctx.fill();
                ctx.fillStyle = '#FFFFFF';
                ctx.font = '700 10px Verdana';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(item.text, x + item.bw / 2, y + item.bh / 2 + 0.5);
                ctx.restore();
            };
            const placed = [];
            items.sort((a, b) => a.y - b.y).forEach(item => {
                let y = item.y;
                for (let tries = 0; tries < 12; tries++) {
                    const box = { x: item.x - item.bw / 2, y: y - item.bh / 2, w: item.bw, h: item.bh };
                    const overlap = placed.some(other => !(box.x + box.w + GAP < other.x || other.x + other.w + GAP < box.x || box.y + box.h + GAP < other.y || other.y + other.h + GAP < box.y));
                    if (!overlap) { placed.push(box); break; }
                    y += item.bh + GAP;
                }
                draw({ ...item, y });
            });
        }
    };
    cagedVolumeYoyChartInstance = new Chart(el.getContext('2d'), {
        type:'line',
        data:{
            labels: rows.map(row => row.label),
            datasets:[
                { label:'Employees YoY', data:jobsYoy, yAxisID:'y', borderColor:C.azulEscuro, backgroundColor:C.azulEscuro, borderWidth:2.5, pointRadius:0, pointHoverRadius:4, pointHitRadius:16, tension:0.25 },
                { label:'Volume YoY', data:volumeYoy, yAxisID:'y', borderColor:C.turquesa, backgroundColor:C.turquesa, borderWidth:2.5, pointRadius:0, pointHoverRadius:4, pointHitRadius:16, tension:0.25 },
            ]
        },
        options:{
            responsive:true,
            maintainAspectRatio:false,
            animation:false,
            interaction:{ mode:'index', intersect:false },
            layout:{ padding:{ left:4, right:44, top:18, bottom:0 } },
            plugins:{ legend:{ display:false }, tooltip:{
                backgroundColor:'rgba(2,28,69,0.94)',
                titleColor:'#9AA8BB',
                bodyColor:'#FFFFFF',
                borderColor:'#344F75',
                borderWidth:1,
                cornerRadius:8,
                padding:12,
                titleFont:{ family:'Verdana', size:12, weight:'700' },
                bodyFont:{ family:'Verdana', size:12 },
                callbacks:{ label(ctx) { return `  ${ctx.dataset.label}: ${cagedPctNumber(ctx.parsed.y, 1)}`; }}
            }},
            scales:{
                x:{ offset:true, grid:{ display:false }, border:{ display:false }, ticks:{ color:C.azulEscuro40, font:{ family:'Verdana', size:11 }, maxRotation:90, minRotation:90 } },
                y:{
                    min:axis.min,
                    max:axis.max,
                    display:false,
                    position:'left',
                    grid:{ color:(ctx) => Number(ctx.tick.value) === 0 ? '#CFD8E3' : 'rgba(0,0,0,0)' },
                    border:{ display:false },
                    ticks:{ color:C.azulEscuro40, font:{ family:'Verdana', size:11 }, stepSize:axis.step, callback(value) { return cagedPctNumber(Number(value), 0); } }
                }
            }
        },
        plugins:[labelPlugin]
    });
    bindCagedVolumeYoyLegendToggles();
}

function cagedPctNumber(value, digits=0) {
    if (!Number.isFinite(value)) return 'n.m.';
    const abs = Math.abs(value).toLocaleString('en-US', { minimumFractionDigits: digits, maximumFractionDigits: digits });
    return value < 0 ? `(${abs}%)` : `${abs}%`;
}

function cagedTightPercentAxis(values) {
    const valid = values.filter(Number.isFinite);
    if (!valid.length) return { min: 0, max: 1, step: 0.5 };
    let min = Math.min(...valid);
    let max = Math.max(...valid);
    if (min === max) {
        min -= 0.5;
        max += 0.5;
    }
    const span = Math.max(max - min, 0.5);
    const pad = Math.max(span * 0.035, 0.08);
    const paddedMin = min - pad;
    const paddedMax = max + pad;
    const range = paddedMax - paddedMin;
    const step = range <= 2 ? 0.5 : range <= 6 ? 1 : range <= 12 ? 2 : 5;
    return {
        min: Math.floor(paddedMin / step) * step,
        max: Math.ceil(paddedMax / step) * step,
        step
    };
}

function cagedBarPercentAxis(values) {
    const valid = values.filter(Number.isFinite);
    if (!valid.length) return { min: 0, max: 10, step: 2 };
    const max = Math.max(...valid, 0);
    const paddedMax = max + Math.max(max * 0.10, 0.8);
    const step = paddedMax <= 6 ? 1 : paddedMax <= 12 ? 2 : paddedMax <= 25 ? 5 : 10;
    return { min: 0, max: Math.ceil(paddedMax / step) * step, step };
}

function cagedChurnMonthlySpotRows() {
    const jobsByKey = new Map(cagedJobsMonthlyRows().map(row => [row.key, row]));
    return cagedSourceRows().map(row => {
        const jobs = jobsByKey.get(row.key);
        if (!jobs) return null;
        const endJobs = jobs.value;
        const startJobs = endJobs - row.net;
        const avgJobs = (startJobs + endJobs) / 2;
        return {
            key: row.key,
            year: row.year,
            month: row.month,
            label: row.label,
            admissions: row.admissions,
            separations: row.separations,
            avgJobs,
            churn: avgJobs ? (row.separations / avgJobs) * 100 : null,
            grossTurnover: avgJobs ? ((row.admissions + row.separations) / avgJobs) * 100 : null
        };
    }).filter(Boolean);
}

function cagedChurnAggregateRows(rows, grain) {
    const groups = new Map();
    rows.forEach(row => {
        const q = grain === 'quarterly' ? quarterOf(row.month) : null;
        const key = grain === 'quarterly' ? `${row.year}-Q${q}` : String(row.year);
        const label = grain === 'quarterly' ? quarterLabel(row.year, q) : String(row.year);
        if (!groups.has(key)) groups.set(key, { key, year: row.year, quarter: q, label, rows: [] });
        groups.get(key).rows.push(row);
    });
    const minRows = grain === 'quarterly' ? 3 : 12;
    return Array.from(groups.values())
        .filter(group => group.rows.length === minRows)
        .sort((a, b) => a.key.localeCompare(b.key))
        .map(group => {
            const admissions = group.rows.reduce((sum, row) => sum + row.admissions, 0);
            const separations = group.rows.reduce((sum, row) => sum + row.separations, 0);
            const avgJobs = group.rows.reduce((sum, row) => sum + row.avgJobs, 0) / group.rows.length;
            return {
                key: group.key,
                year: group.year,
                quarter: group.quarter,
                label: group.label,
                admissions,
                separations,
                avgJobs,
                churn: avgJobs ? (separations / avgJobs) * 100 : null,
                grossTurnover: avgJobs ? ((admissions + separations) / avgJobs) * 100 : null
            };
        });
}

function cagedChurnSpotRows(grain=cagedChurnState.grain) {
    const monthly = cagedChurnMonthlySpotRows();
    if (grain === 'monthly') return monthly;
    return cagedChurnAggregateRows(monthly, grain);
}

function cagedChurnLtmRows(grain=cagedChurnState.grain) {
    if (grain === 'annual') return cagedChurnSpotRows('annual');
    const spotRows = cagedChurnSpotRows(grain);
    const windowSize = grain === 'monthly' ? 12 : 4;
    const out = [];
    for (let i = windowSize - 1; i < spotRows.length; i++) {
        const windowRows = spotRows.slice(i - windowSize + 1, i + 1);
        const admissions = windowRows.reduce((sum, row) => sum + row.admissions, 0);
        const separations = windowRows.reduce((sum, row) => sum + row.separations, 0);
        const avgJobs = windowRows.reduce((sum, row) => sum + row.avgJobs, 0) / windowRows.length;
        out.push({
            ...spotRows[i],
            admissions,
            separations,
            avgJobs,
            churn: avgJobs ? (separations / avgJobs) * 100 : null,
            grossTurnover: avgJobs ? ((admissions + separations) / avgJobs) * 100 : null
        });
    }
    return out;
}

function cagedChurnPeriodRows() {
    return cagedChurnState.base === 'ltm' && cagedChurnState.grain !== 'annual'
        ? cagedChurnLtmRows(cagedChurnState.grain)
        : cagedChurnSpotRows(cagedChurnState.grain);
}

function cagedChurnPeriodKeyForCurrentGrain(date) {
    if (!date || !Number.isFinite(date.year) || !Number.isFinite(date.month)) return null;
    if (cagedChurnState.grain === 'monthly') return periodKey(date.year, date.month);
    if (cagedChurnState.grain === 'quarterly') return `${date.year}-Q${quarterOf(date.month)}`;
    return String(date.year);
}

function ensureCagedChurnRange() {
    if (cagedChurnState.grain === 'annual') cagedChurnState.base = 'spot';
    const rows = cagedChurnPeriodRows();
    if (!rows.length) return;
    const keys = rows.map(row => row.key);
    const defaultFrom = keys.includes('2023-Q1') ? '2023-Q1' : keys[Math.max(0, keys.length - 12)];
    const defaultTo = keys.includes('2026-Q1') ? '2026-Q1' : keys[keys.length - 1];
    if (!cagedChurnState.from || !keys.includes(cagedChurnState.from)) cagedChurnState.from = defaultFrom;
    if (!cagedChurnState.to || !keys.includes(cagedChurnState.to)) cagedChurnState.to = defaultTo;
    if (keys.indexOf(cagedChurnState.from) > keys.indexOf(cagedChurnState.to)) [cagedChurnState.from, cagedChurnState.to] = [cagedChurnState.to, cagedChurnState.from];
}

function cagedChurnSelectedRows() {
    ensureCagedChurnRange();
    return cagedChurnPeriodRows().filter(row => row.key >= cagedChurnState.from && row.key <= cagedChurnState.to);
}

function cagedChurnPeriodSelect(id, current, onchangeFn) {
    const rows = cagedChurnPeriodRows();
    return `<select id="${id}" class="df-input" onchange="${onchangeFn}" style="width:126px;">${rows.map(row => `<option value="${row.key}" ${row.key === current ? 'selected' : ''}>${row.label}</option>`).join('')}</select>`;
}

        ${selectBlock('Base', `<select id="caged-churn-base-select" class="df-input" onchange="setCagedChurnBase()" ${baseDisabled} style="width:126px;"><option value="spot" ${cagedChurnState.base === 'spot' ? 'selected' : ''}>Spot</option><option value="ltm" ${cagedChurnState.base === 'ltm' ? 'selected' : ''}>LTM</option></select>`)}
        ${selectBlock('From', cagedChurnPeriodSelect('caged-churn-from-select', cagedChurnState.from, 'setCagedChurnRange()'))}
        ${selectBlock('To', cagedChurnPeriodSelect('caged-churn-to-select', cagedChurnState.to, 'setCagedChurnRange()'))}

}

function bindCagedChurnLegendToggles() {
    document.querySelectorAll('#caged-churn-card .chart-legend-item[data-dataset-index]').forEach(item => {

            const idx = Number(item.dataset.datasetIndex);

            updateCagedChurnLegendStates();

                    const y = Math.max(chart.chartArea.top + 4, Math.min(labelCenterY - bh / 2, chart.chartArea.bottom - bh - 4));
                    ctx.fillStyle = barColors[i] || C.azulEscuro;
                    roundedRect(ctx, x, y, bw, bh, 3);
                    ctx.fillStyle = '#FFFFFF';
                    ctx.fillText(text, x + bw / 2, y + bh / 2 + 0.5);
                });
            }
            if (chart.isDatasetVisible(1) && rows.length) {

function cagedJobsYoyAxis(values) {
    const valid = values.filter(Number.isFinite);
    const step = 5;
    if (!valid.length) return { min: 0, max: step, step };
    let min = Math.min(...valid);
    let max = Math.max(...valid);
    if (min === max) {
        min -= 1;
        max += 1;
    }
    const span = max - min;
    const pad = Math.max(span * 0.18, 1.5);
    return {
        min: Math.min(0, Math.floor((min - pad) / step) * step),
        max: Math.max(0, Math.ceil((max + pad) / step) * step),
        step
    };
}

function cagedJobsHighlightedIndices(rows) {

    if (cagedJobsState.grain === 'quarterly') return rows.map((row, i) => row.quarter === anchor.quarter ? i : -1).filter(i => i >= 0);
    return [rows.length - 1];
}

function cagedMonthlyComparisonMonthlyOptions() {
    return cagedSourceRows().map(row => ({
        ...row,
        label: `${MONTH_NAMES[row.month - 1]}/${row.year}`,
        quarter: quarterOf(row.month)
    }));
}

function cagedMonthlyComparisonQuarterlyOptions() {
    const groups = new Map();
    cagedSourceRows().forEach(row => {
        const q = quarterOf(row.month);
        const key = `${row.year}-Q${q}`;
        if (!groups.has(key)) groups.set(key, { key, year: row.year, quarter: q, label: quarterLabel(row.year, q), rows: [] });
        groups.get(key).rows.push(row);
    });
    return Array.from(groups.values())
        .filter(group => group.rows.length === 3)
        .sort((a, b) => a.key.localeCompare(b.key))
        .map(group => cagedSumRows(group.rows, { key: group.key, year: group.year, quarter: group.quarter, label: group.label }));
}

function cagedMonthlyComparisonOptions() {
    return cagedMonthlyComparisonState.grain === 'quarterly'
        ? cagedMonthlyComparisonQuarterlyOptions()
        : cagedMonthlyComparisonMonthlyOptions();
}

function cagedMonthlyComparisonPeriods() {
    const field = cagedMonthlyComparisonState.grain === 'quarterly' ? 'quarter' : 'month';
    return [...new Set(cagedMonthlyComparisonOptions().map(row => row[field]))].sort((a, b) => a - b);
}

function cagedMonthlyComparisonSelectedPeriod() {
    return cagedMonthlyComparisonState.grain === 'quarterly'
        ? cagedMonthlyComparisonState.quarter
        : cagedMonthlyComparisonState.month;
}

function cagedMonthlyComparisonYearsForPeriod(period) {
    const field = cagedMonthlyComparisonState.grain === 'quarterly' ? 'quarter' : 'month';
    return [...new Set(cagedMonthlyComparisonOptions()
        .filter(row => row[field] === period)
        .map(row => row.year))]
        .sort((a, b) => a - b);
}

function ensureCagedMonthlyComparisonState() {
    const rows = cagedMonthlyComparisonOptions();
    if (!rows.length) return;
    const latest = rows[rows.length - 1];
    const periods = cagedMonthlyComparisonPeriods();
    if (cagedMonthlyComparisonState.grain === 'quarterly') {
        if (!cagedMonthlyComparisonState.quarter || !periods.includes(cagedMonthlyComparisonState.quarter)) {
            cagedMonthlyComparisonState.quarter = latest.quarter;
        }
    } else if (!cagedMonthlyComparisonState.month || !periods.includes(cagedMonthlyComparisonState.month)) {
        cagedMonthlyComparisonState.month = latest.month;
    }
    const years = cagedMonthlyComparisonYearsForPeriod(cagedMonthlyComparisonSelectedPeriod());
    if (!years.length) return;
    if (!cagedMonthlyComparisonState.fromYear || !years.includes(cagedMonthlyComparisonState.fromYear)) {
        cagedMonthlyComparisonState.fromYear = years[0];
    }
    if (!cagedMonthlyComparisonState.toYear || !years.includes(cagedMonthlyComparisonState.toYear)) {
        cagedMonthlyComparisonState.toYear = years[years.length - 1];
    }
    if (cagedMonthlyComparisonState.fromYear > cagedMonthlyComparisonState.toYear) {
        [cagedMonthlyComparisonState.fromYear, cagedMonthlyComparisonState.toYear] = [cagedMonthlyComparisonState.toYear, cagedMonthlyComparisonState.fromYear];
    }
}

function cagedNumber(value) {
    const rounded = Math.round(Number(value) || 0);
    const abs = Math.abs(rounded).toLocaleString('en-US');
    return rounded < 0 ? `(${abs})` : abs;
}

function niceCagedStep(range, targetTicks=6) {
    const raw = Math.max(Number(range || 0) / targetTicks, 25);
    const magnitude = Math.pow(10, Math.floor(Math.log10(raw)));
    const normalized = raw / magnitude;
    if (normalized <= 1) return magnitude;
    if (normalized <= 2) return 2 * magnitude;
    if (normalized <= 2.5) return 2.5 * magnitude;
    if (normalized <= 5) return 5 * magnitude;
    return 10 * magnitude;
}

function cagedAxisBounds(values, options={}) {
    const valid = values.map(Number).filter(Number.isFinite);
    const includeZero = options.includeZero !== false;
    const padRatio = options.padRatio ?? 0.07;
    const targetTicks = options.targetTicks ?? 6;
    const minSpan = options.minSpan ?? 50;
    if (!valid.length) return { min: 0, max: 100, step: 25 };
    let min = Math.min(...valid);
    let max = Math.max(...valid);
    if (includeZero) {
        min = Math.min(min, 0);
        max = Math.max(max, 0);
    }
    if (min === max) {
        min -= minSpan / 2;
        max += minSpan / 2;
        if (includeZero) min = Math.min(min, 0);
    }
    const span = Math.max(max - min, minSpan);
    const pad = Math.max(span * padRatio, minSpan * 0.15);
    let paddedMin = min - pad;
    let paddedMax = max + pad;
    if (includeZero && min >= 0) paddedMin = 0;
    if (includeZero && max <= 0) paddedMax = 0;
    const step = options.stepSize || niceCagedStep(paddedMax - paddedMin, targetTicks);
    return {
        min: Math.floor(paddedMin / step) * step,
        max: Math.ceil(paddedMax / step) * step,
        step
    };
}

    const years = new Map();
    scopes.forEach(scope => {
        vivaraCagedRows(scope).forEach(row => {
            if (!years.has(row.year)) years.set(row.year, { year: row.year, Core: null, Expanded: null });
            const target = years.get(row.year);
            if (!target[scope]) target[scope] = { admissions: 0, separations: 0, net: 0 };
            target[scope].admissions += row.admissions;
            target[scope].separations += row.separations;
            target[scope].net += row.net;
        });
    });
    return Array.from(years.values()).sort((a, b) => a.year - b.year);
}

function vivaraCagedCnaeTotals() {
    const labels = (window.VIVARA_CAGED_DATA && window.VIVARA_CAGED_DATA.filters && window.VIVARA_CAGED_DATA.filters.expanded_cnaes) || {};
    const rows = (window.VIVARA_CAGED_DATA && window.VIVARA_CAGED_DATA.by_cnae_rows) || [];
    const totals = new Map();
    rows.forEach(row => {
        if (!totals.has(row.scope)) totals.set(row.scope, { cnae: row.scope, label: labels[row.scope] || row.scope, admissions: 0, separations: 0, net: 0 });
        const target = totals.get(row.scope);
        target.admissions += Number(row.admissions || 0);
        target.separations += Number(row.separations || 0);
        target.net += Number(row.net || 0);
    });
    return Array.from(totals.values()).sort((a, b) => Math.abs(b.admissions + b.separations) - Math.abs(a.admissions + a.separations));
}

    rubber: { label: 'Rubber', description: '50% Butadiene Rotterdam + 50% Styrene FOB US Gulf', fields: { usd: 'rubber_usd', brl: 'rubber_brl' } },
    blended: { label: 'Petrochemical Cost Index', description: 'Weighted basket — 57.1% EVA + 21.4% Rubber + 21.4% PVC (the 20.0% / 7.5% / 7.5% of total cost, renormalized to 100%). Each component rebased to 1.0 at 2014-05-23, the first week all three series are available, so the index reflects only relative variation.', fields: { usd: 'eva_usd', brl: 'eva_brl' } },
};

const COST_INDEX_BLEND_WEIGHTS = { eva: 0.20 / 0.35, rubber: 0.075 / 0.35, pvc: 0.075 / 0.35 };

function costIndexBlendedSeries(currency) {
    const f = { eva: `eva_${currency}`, pvc: `pvc_${currency}`, rubber: `rubber_${currency}` };
    const data = (window.SPORTS_RETAIL_COST_INDEX_DATA || [])
        .filter(row => [f.eva, f.pvc, f.rubber].every(k => row[k] !== null && row[k] !== undefined))
        .sort((a, b) => a.week_date.localeCompare(b.week_date));
    const map = new Map();
    if (!data.length) return map;
    const base = data[0];
    const b = { eva: Number(base[f.eva]), pvc: Number(base[f.pvc]), rubber: Number(base[f.rubber]) };
    data.forEach(row => {
        map.set(row.week_date,
            COST_INDEX_BLEND_WEIGHTS.eva * (Number(row[f.eva]) / b.eva) +
            COST_INDEX_BLEND_WEIGHTS.rubber * (Number(row[f.rubber]) / b.rubber) +
            COST_INDEX_BLEND_WEIGHTS.pvc * (Number(row[f.pvc]) / b.pvc));
    });
    return map;
}

function costIndexDateLabel(dateKey) {
    const d = new Date(`${dateKey}T00:00:00`);
    if (Number.isNaN(d.getTime())) return dateKey || '';
    return `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${String(d.getFullYear()).slice(-2)}`;
}

function costIndexAxisDateLabel(dateKey) {
    const d = new Date(`${dateKey}T00:00:00`);
    if (Number.isNaN(d.getTime())) return dateKey || '';
    return `${MONTH_NAMES[d.getMonth()]}/${String(d.getFullYear()).slice(-2)}`;
}

function costIndexRows() {
    if (costIndexState.variable === 'blended') {
        return Array.from(costIndexBlendedSeries(costIndexState.currency).entries())
            .map(([date, value]) => ({
                key: date,
                label: costIndexDateLabel(date),
                axisLabel: costIndexAxisDateLabel(date),
                value,
            }))
            .sort((a, b) => a.key.localeCompare(b.key));
    }
    const cfg = COST_INDEX_CONFIG[costIndexState.variable] || COST_INDEX_CONFIG.eva;
    const field = cfg.fields[costIndexState.currency] || cfg.fields.usd;
    return (window.SPORTS_RETAIL_COST_INDEX_DATA || [])
        .map(row => ({
            key: row.week_date,
            label: costIndexDateLabel(row.week_date),
            axisLabel: costIndexAxisDateLabel(row.week_date),
            value: row[field] === null || row[field] === undefined ? null : Number(row[field]),
        }))
        .filter(row => Number.isFinite(row.value))
        .sort((a, b) => a.key.localeCompare(b.key));
}

function ensureCostIndexRange() {
    const rows = costIndexRows();
    if (!rows.length) return rows;
    const keys = rows.map(row => row.key);
    if (!costIndexState.from || !keys.includes(costIndexState.from)) costIndexState.from = keys[0];
    if (!costIndexState.to || !keys.includes(costIndexState.to)) costIndexState.to = keys[keys.length - 1];
    if (costIndexState.from > costIndexState.to) [costIndexState.from, costIndexState.to] = [costIndexState.to, costIndexState.from];
    return rows;
}

function filteredCostIndexRows() {
    return ensureCostIndexRange().filter(row => row.key >= costIndexState.from && row.key <= costIndexState.to);
}

function costIndexSelect(id, current, onchangeFn, rows, width=126) {
    return `<select id="${id}" class="df-input" onchange="${onchangeFn}" style="width:${width}px;">${rows.map(row => `<option value="${row.key}" ${row.key === current ? 'selected' : ''}>${row.label}</option>`).join('')}</select>`;
}

function costIndexRangeOptions(rows, mode) {
    const months = new Map();
    rows.forEach(row => {
        const monthKey = row.key.slice(0, 7);
        const option = { key: row.key, label: row.axisLabel };
        if (mode === 'to' || !months.has(monthKey)) months.set(monthKey, option);
    });
    return Array.from(months.values());
}

function fmtCostValue(value, compact=false) {
    if (!Number.isFinite(value)) return 'n.m.';
    const number = Number(value).toLocaleString('en-US', { minimumFractionDigits: compact ? 1 : 2, maximumFractionDigits: compact ? 1 : 2 });
    return number;
}

function calcAverage(values) {
    const valid = values.filter(Number.isFinite);
    if (!valid.length) return null;
    return valid.reduce((sum, value) => sum + value, 0) / valid.length;
}

function calcStdDev(values) {
    const valid = values.filter(Number.isFinite);
    if (!valid.length) return null;
    const avg = calcAverage(valid);
    return Math.sqrt(valid.reduce((sum, value) => sum + Math.pow(value - avg, 2), 0) / valid.length);
}

function costIndexNiceStep(rawStep) {
    const steps = [0.01, 0.02, 0.05, 0.10, 0.20, 0.25, 0.50, 1.00, 2.00, 5.00];
    return steps.find(step => step >= rawStep) || steps[steps.length - 1];
}

function costIndexAxisRange(values) {
    const valid = values.filter(Number.isFinite);
    if (!valid.length) return { min: 0, max: 1, step: 0.25 };
    const minValue = Math.min(...valid);
    const maxValue = Math.max(...valid);
    const range = Math.max(maxValue - minValue, 0.10);
    const step = costIndexNiceStep(range / 8);
    let min = Math.floor((minValue - step * 0.35) / step) * step;
    let max = Math.ceil((maxValue + step * 0.35) / step) * step;
    if (min === max) max += step;
    return {
        min: Number(Math.max(0, min).toFixed(4)),
        max: Number(max.toFixed(4)),
        step: Number(step.toFixed(4)),
    };
}

function costIndexTablePeriodLabel(row) {
    if (costIndexTableState.grain === 'weekly') return costIndexDateLabel(row.key);
    if (costIndexTableState.grain === 'monthly') return monthLabel(row.year, row.month);
    if (costIndexTableState.grain === 'quarterly') return quarterLabel(row.year, row.quarter);
    return String(row.year);
}

function costIndexIsoDate(date) {
    return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
}

function costIndexAddDays(dateKey, days) {
    const d = new Date(`${dateKey}T00:00:00`);
    d.setDate(d.getDate() + days);
    return costIndexIsoDate(d);
}

function costIndexTablePeriodKeyForDate(date) {
    if (!date || !Number.isFinite(date.year) || !Number.isFinite(date.month)) return null;
    if (costIndexTableState.grain === 'weekly') return date.key || null;
    if (costIndexTableState.grain === 'monthly') return periodKey(date.year, date.month);
    if (costIndexTableState.grain === 'quarterly') return `${date.year}-Q${quarterOf(date.month)}`;
    return String(date.year);
}

function costIndexTableParseStart(key) {
    if (!key) return null;
    if (/^\d{4}-\d{2}-\d{2}$/.test(key)) {
        const d = new Date(`${key}T00:00:00`);
        return { key, year: d.getFullYear(), month: d.getMonth() + 1 };
    }
    return parsePeriodStart(key);
}

function costIndexTableParseEnd(key) {
    if (!key) return null;
    if (/^\d{4}-\d{2}-\d{2}$/.test(key)) {
        const d = new Date(`${key}T00:00:00`);
        return { key, year: d.getFullYear(), month: d.getMonth() + 1 };
    }
    return parsePeriodEnd(key);
}

function costIndexTableWeeklyRows() {
    let rows;
    if (costIndexTableState.variable === 'blended') {
        const usdMap = costIndexBlendedSeries('usd');
        const brlMap = costIndexBlendedSeries('brl');
        const dates = Array.from(new Set([...usdMap.keys(), ...brlMap.keys()])).sort((a, b) => a.localeCompare(b));
        rows = dates.map(date => {
            const d = new Date(`${date}T00:00:00`);
            return {
                key: date,
                year: d.getFullYear(),
                month: d.getMonth() + 1,
                quarter: quarterOf(d.getMonth() + 1),
                label: costIndexDateLabel(date),
                usd: usdMap.has(date) ? usdMap.get(date) : null,
                brl: brlMap.has(date) ? brlMap.get(date) : null,
                forecast: false,
            };
        }).filter(row => Number.isFinite(row.usd) || Number.isFinite(row.brl));
    } else {
        const cfg = COST_INDEX_CONFIG[costIndexTableState.variable] || COST_INDEX_CONFIG.eva;
        rows = (window.SPORTS_RETAIL_COST_INDEX_DATA || [])
            .map(row => {
                const d = new Date(`${row.week_date}T00:00:00`);
                return {
                    key: row.week_date,
                    year: d.getFullYear(),
                    month: d.getMonth() + 1,
                    quarter: quarterOf(d.getMonth() + 1),
                    label: costIndexDateLabel(row.week_date),
                    usd: row[cfg.fields.usd] === null || row[cfg.fields.usd] === undefined ? null : Number(row[cfg.fields.usd]),
                    brl: row[cfg.fields.brl] === null || row[cfg.fields.brl] === undefined ? null : Number(row[cfg.fields.brl]),
                    forecast: false,
                };
            })
            .filter(row => Number.isFinite(row.usd) || Number.isFinite(row.brl))
            .sort((a, b) => a.key.localeCompare(b.key));
    }
    if (costIndexTableState.forecast !== 'on' || !rows.length) return rows;
    const last = rows[rows.length - 1];
    const projected = [];
    for (let i = 1; i <= 52; i++) {
        const key = costIndexAddDays(last.key, i * 7);
        const d = new Date(`${key}T00:00:00`);
        projected.push({
            key,
            year: d.getFullYear(),
            month: d.getMonth() + 1,
            quarter: quarterOf(d.getMonth() + 1),
            label: costIndexDateLabel(key),
            usd: last.usd,
            brl: last.brl,
            forecast: true,
        });
    }
    return rows.concat(projected);
}

function costIndexTableAvg(rows, field) {
    const values = rows.map(row => row[field]).filter(Number.isFinite);
    if (!values.length) return null;
    return values.reduce((sum, value) => sum + value, 0) / values.length;
}

function costIndexTableRows() {
    const weekly = costIndexTableWeeklyRows();
    if (costIndexTableState.grain === 'weekly') return weekly.map(row => ({ ...row, label: costIndexTablePeriodLabel(row) }));
    const groups = new Map();
    weekly.forEach(row => {
        const key = costIndexTableState.grain === 'monthly'
            ? periodKey(row.year, row.month)
            : costIndexTableState.grain === 'quarterly'
                ? `${row.year}-Q${row.quarter}`
                : String(row.year);
        if (!groups.has(key)) groups.set(key, { key, year: row.year, month: row.month, quarter: row.quarter, weeks: [] });
        groups.get(key).weeks.push(row);
    });
    return Array.from(groups.values()).map(group => ({
        key: group.key,
        year: group.year,
        month: group.month,
        quarter: group.quarter,
        label: costIndexTablePeriodLabel(group),
        usd: costIndexTableAvg(group.weeks, 'usd'),
        brl: costIndexTableAvg(group.weeks, 'brl'),
        forecast: group.weeks.some(row => row.forecast),
    })).sort((a, b) => a.key.localeCompare(b.key));
}

function ensureCostIndexTableRange() {
    const rows = costIndexTableRows();
    if (!rows.length) return rows;
    const keys = rows.map(row => row.key);
    if (!costIndexTableState.from || !keys.includes(costIndexTableState.from)) costIndexTableState.from = keys[0];
    if (!costIndexTableState.to || !keys.includes(costIndexTableState.to)) costIndexTableState.to = keys[keys.length - 1];
    if (keys.indexOf(costIndexTableState.from) > keys.indexOf(costIndexTableState.to)) {
        [costIndexTableState.from, costIndexTableState.to] = [costIndexTableState.to, costIndexTableState.from];
    }
    return rows;
}

function costIndexTableSelect(id, current, onchangeFn) {
    const rows = costIndexTableRows();
    return `<select id="${id}" class="df-input" onchange="${onchangeFn}" style="width:116px;">${rows.map(row => `<option value="${row.key}" ${current === row.key ? 'selected' : ''}>${row.label}</option>`).join('')}</select>`;
}

function costIndexTableControlsHtml() {
    ensureCostIndexTableRange();
    return `<div class="imports-controls" style="display:flex;align-items:flex-end;justify-content:flex-end;gap:18px;flex-wrap:wrap;margin-left:auto;">
        ${selectBlock('Grain', `<select id="cost-index-table-grain-select" class="df-input" onchange="setCostIndexTableGrain()" style="width:126px;"><option value="weekly" ${costIndexTableState.grain === 'weekly' ? 'selected' : ''}>Weekly</option><option value="monthly" ${costIndexTableState.grain === 'monthly' ? 'selected' : ''}>Monthly</option><option value="quarterly" ${costIndexTableState.grain === 'quarterly' ? 'selected' : ''}>Quarterly</option><option value="annual" ${costIndexTableState.grain === 'annual' ? 'selected' : ''}>Annual</option></select>`)}
        ${selectBlock('Variable', `<select id="cost-index-table-variable-select" class="df-input" onchange="setCostIndexTableVariable()" style="width:200px;"><option value="blended" ${costIndexTableState.variable === 'blended' ? 'selected' : ''}>Petrochemical Cost Index</option><option value="eva" ${costIndexTableState.variable === 'eva' ? 'selected' : ''}>EVA</option><option value="pvc" ${costIndexTableState.variable === 'pvc' ? 'selected' : ''}>PVC</option><option value="rubber" ${costIndexTableState.variable === 'rubber' ? 'selected' : ''}>Rubber</option></select>`)}
        ${selectBlock('Forecast', `<select id="cost-index-table-forecast-select" class="df-input" onchange="setCostIndexTableForecast()" style="width:116px;"><option value="off" ${costIndexTableState.forecast !== 'on' ? 'selected' : ''}>No</option><option value="on" ${costIndexTableState.forecast === 'on' ? 'selected' : ''}>Yes</option></select>`)}
        ${selectBlock('From', costIndexTableSelect('cost-index-table-from-select', costIndexTableState.from, 'setCostIndexTableRange()'))}
        ${selectBlock('To', costIndexTableSelect('cost-index-table-to-select', costIndexTableState.to, 'setCostIndexTableRange()'))}
    </div>`;
}

function costIndexTableVariationRows(rows, field) {
    return Object.fromEntries(costIndexTableVariationDefs().map(def => [def.key, rows.map((row, idx) => {
        if (idx < def.lag) return null;
        const base = rows[idx - def.lag]?.[field];
        return Number.isFinite(row[field]) && Number.isFinite(base) && base ? row[field] / base - 1 : null;
    })]));
}

function costIndexTableVariationDefs() {
    if (costIndexTableState.grain === 'weekly') return [
        { key: 'wow', label: 'WoW', lag: 1 },
        { key: 'mom', label: 'MoM', lag: 4 },
        { key: 'qoq', label: 'QoQ', lag: 13 },
        { key: 'yoy', label: 'YoY', lag: 52 },
    ];
    if (costIndexTableState.grain === 'monthly') return [
        { key: 'mom', label: 'MoM', lag: 1 },
        { key: 'qoq', label: 'QoQ', lag: 3 },
        { key: 'yoy', label: 'YoY', lag: 12 },
    ];
    if (costIndexTableState.grain === 'quarterly') return [
        { key: 'qoq', label: 'QoQ', lag: 1 },
        { key: 'yoy', label: 'YoY', lag: 4 },
    ];
    return [{ key: 'yoy', label: 'YoY', lag: 1 }];
}

function costIndexTablePctCell(value) {
    const finite = Number.isFinite(value);
    const color = !finite ? C.azulEscuro40 : value < 0 ? '#B0002A' : '#00857D';
    return `<td style="padding:8px 10px;text-align:center;color:${color};font-weight:400;font-size:12px;">${finite ? fmtPctEN(value, 0) : 'n.m.'}</td>`;
}

function costIndexTableBlock(rows, field, title, rowBg, borderColor, withSpacer=false, allRows=rows) {
    const allChanges = costIndexTableVariationRows(allRows, field);
    const rowIndex = new Map(allRows.map((row, idx) => [row.key, idx]));
    const changes = Object.fromEntries(Object.entries(allChanges).map(([key, values]) => [key, rows.map(row => values[rowIndex.get(row.key)] ?? null)]));
    const spacer = withSpacer ? `<tr aria-hidden="true"><td colspan="${rows.length + 1}" style="height:18px;background:#FFFFFF;border:0;padding:0;"></td></tr>` : '';
    const valueRow = `<tr style="border-bottom:1px solid ${borderColor};background:${rowBg};">
        <td class="imports-table-sticky" style="background:${rowBg};padding:10px 12px;color:${C.azulEscuro};font-weight:800;font-size:13px;border-right:1px solid ${borderColor};">${title}</td>
        ${rows.map(row => `<td style="background:${rowBg};padding:9px 10px;text-align:center;color:${C.azulEscuro};font-weight:800;font-size:13px;">${fmtCostValue(row[field])}</td>`).join('')}
    </tr>`;
    const changeRow = (label, values, isLast=false) => `<tr style="border-bottom:${isLast ? '0' : '1px solid #E8ECF0'};background:#FFFFFF;">
        <td class="imports-table-sticky" style="background:#FFFFFF;padding:8px 12px 8px 24px;color:${C.azulEscuro};font-weight:400;font-size:13px;border-right:1px solid #E8ECF0;">${label}</td>
        ${values.map(value => costIndexTablePctCell(value)).join('')}
    </tr>`;
    const defs = costIndexTableVariationDefs();
    return `${spacer}${valueRow}${defs.map((def, idx) => changeRow(def.label, changes[def.key], idx === defs.length - 1)).join('')}`;
}

function renderCostIndexChart() {
    const canvas = document.getElementById('cost-index-chart');
    if (!canvas) return;
    if (costIndexChartInstance) {
        costIndexChartInstance.destroy();
        costIndexChartInstance = null;
    }
    const rows = filteredCostIndexRows();
    if (!rows.length) return;
    const labels = rows.map(row => row.axisLabel);
    const values = rows.map(row => row.value);
    const avg = calcAverage(values);
    const std = calcStdDev(values);
    const plus = avg + costIndexState.stdDev * std;
    const minus = avg - costIndexState.stdDev * std;
    const cfg = COST_INDEX_CONFIG[costIndexState.variable] || COST_INDEX_CONFIG.eva;
    const allVals = [...values, avg, plus, minus].filter(Number.isFinite);
    const yAxis = costIndexAxisRange(allVals);
    const monthInterval = rows.length > 260 ? 6 : rows.length > 130 ? 3 : 1;
    const visibleXLabelIndices = new Set();
    let lastMonthKey = null;
    let visibleMonthCount = -1;
    rows.forEach((row, index) => {
        const monthKey = row.key.slice(0, 7);
        if (monthKey !== lastMonthKey) {
            visibleMonthCount += 1;
            if (visibleMonthCount % monthInterval === 0) visibleXLabelIndices.add(index);
            lastMonthKey = monthKey;
        }
    });
    const horizDs = (label, value, color) => ({
        label,
        data: Array(labels.length).fill(value),
        borderColor: color,
        backgroundColor: color,
        borderWidth: 2,
        pointRadius: 0,
        pointHoverRadius: 0,
        pointHitRadius: 0,
        tension: 0,
        _badge: true,
        _badgeVal: value,
    });
    const badgePlugin = {
        id: 'costIndexBadges',
        afterDraw(chart) {
            const { ctx, chartArea } = chart;
            const badges = [];
            chart.data.datasets.forEach((ds, di) => {
                if (!ds._badge || !chart.isDatasetVisible(di) || !Number.isFinite(ds._badgeVal)) return;
                const meta = chart.getDatasetMeta(di);
                const points = meta.data || [];
                if (!points.length) return;
                const point = points[points.length - 1];
                if (!point) return;
                const text = fmtCostValue(ds._badgeVal, true);
                ctx.save();
                ctx.font = '700 11px Verdana';
                const width = ctx.measureText(text).width + 12;
                ctx.restore();
                badges.push({
                    text,
                    color: ds.borderColor,
                    desiredY: point.y - 10,
                    x: Math.min(chart.width - width - 2, Math.max(chartArea.right - width + 18, point.x - width / 2)),
                    width,
                    height: 20,
                });
            });
            if (!badges.length) return;
            badges.sort((a, b) => a.desiredY - b.desiredY);
            const gap = 3;
            badges.forEach((badge, index) => {
                const minY = index ? badges[index - 1].y + badges[index - 1].height + gap : chartArea.top + 2;
                badge.y = Math.max(chartArea.top + 2, Math.min(badge.desiredY, chartArea.bottom - badge.height - 2));
                badge.y = Math.max(badge.y, minY);
            });
            for (let i = badges.length - 1; i >= 0; i--) {
                const maxY = i === badges.length - 1 ? chartArea.bottom - badges[i].height - 2 : badges[i + 1].y - badges[i].height - gap;
                badges[i].y = Math.min(badges[i].y, maxY);
                badges[i].y = Math.max(chartArea.top + 2, badges[i].y);
            }
            badges.forEach(badge => {
                ctx.save();
                ctx.font = '700 11px Verdana';
                ctx.fillStyle = badge.color;
                roundedRect(ctx, badge.x, badge.y, badge.width, badge.height, 3);
                ctx.fill();
                ctx.fillStyle = '#FFFFFF';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(badge.text, badge.x + badge.width / 2, badge.y + badge.height / 2 + 0.5);
                ctx.restore();
            });
        }
    };
    costIndexChartInstance = new Chart(canvas.getContext('2d'), {
        type: 'line',
        plugins: [badgePlugin],
        data: {
            labels,
            datasets: [
                { label: cfg.label, data: values, borderColor: C.azulEscuro, backgroundColor: C.azulEscuro, borderWidth: 2, pointRadius: 0, pointHoverRadius: 0, pointHitRadius: 16, tension: 0.2, _badge: true, _badgeVal: values[values.length - 1] },
                horizDs('Average', avg, '#5D2A2C'),
                horizDs(`+${costIndexState.stdDev} SD`, plus, C.cereja),
                horizDs(`-${costIndexState.stdDev} SD`, minus, C.turquesa),
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            layout: { padding: { left: 8, right: 86, top: 8, bottom: 0 } },
            plugins: {
                legend: { position: 'top', align: 'start', labels: { padding: 14, font: { size: 11, weight: '700', family: 'Verdana' }, boxWidth: 22, boxHeight: 3, usePointStyle: false, color: C.azulEscuro } },
                tooltip: { backgroundColor: 'rgba(2,28,69,0.94)', titleColor: '#9AA8BB', bodyColor: '#FFFFFF', borderColor: '#344F75', borderWidth: 1, cornerRadius: 8, padding: 10, callbacks: { label: ctx => `  ${ctx.dataset.label}: ${fmtCostValue(ctx.parsed.y)}` } }
            },
            scales: {
                x: { ticks: { autoSkip: false, minRotation: 90, maxRotation: 90, color: C.azulEscuro40, font: { size: 9, family: 'Verdana' }, callback: function(value, index) { return visibleXLabelIndices.has(index) ? this.getLabelForValue(value) : ''; } }, grid: { display: false }, border: { color: C.azulEscuro20 } },
                y: { min: yAxis.min, max: yAxis.max, ticks: { stepSize: yAxis.step, maxTicksLimit: 9, color: C.azulEscuro40, font: { size: 10, family: 'Verdana' }, callback: value => fmtCostValue(Number(value), true) }, grid: { display: false }, border: { color: C.azulEscuro20 } }
            }
        }
    });
}

function renderTabs() {
    const nav = document.getElementById('tab-nav');
    nav.innerHTML = TABS.map(t => `<button class="tab-btn ${activeTab === t.id ? 'active' : ''}" style="color:${activeTab === t.id ? '#FFF' : '#9AA8BB'};border-bottom:2px solid ${activeTab === t.id ? '#6FDDCB' : 'transparent'};padding:10px 18px;font-size:12px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;" onclick="activeTab='${t.id}';renderTabs();renderContent();">${t.label}</button>`).join('');
}

function renderEcomDataTab() {
    const content = document.getElementById('tab-content');
    const tmpl = document.getElementById('ecom-tab-template');
    if (tmpl) content.appendChild(tmpl.content.cloneNode(true));
    document.getElementById('footer-source').textContent = 'Source: Aster BQ (Olympikus/Mizuno/Centauro/UA), Adidas/Nike/Asics/Netshoes scrapers';
    if (window._ecomInit) window._ecomInit();
}

function renderContent() {
    // Destroy ecom chart instances before wiping DOM (prevents orphaned Chart.js references)
    if (window._ecomDestroy) window._ecomDestroy();
    const content = document.getElementById('tab-content');
    content.innerHTML = '';
    if (activeTab === 'ecom-data') {
        renderEcomDataTab();
        return;
    }
    if (activeTab === 'methodology') {
        renderMethodologyPage();
        document.getElementById('footer-source').textContent = 'Fonte: relatórios da Vulcabras, Novo CAGED / MTE, RAIS / MTE e registros públicos de CNPJ';
        return;
    }
    if (activeTab === 'caged') {
        renderCagedCard();
        document.getElementById('footer-source').textContent = '';
        return;
    }
    if (activeTab === 'vivara-caged') {
        renderVivaraCagedPage();
        document.getElementById('footer-source').textContent = 'Source: Novo CAGED / MTE CAGEDMOV public microdata, CVM Formulario de Referencia 2025 V9 and Vivara RI';
        return;
    }
    if (activeTab === 'industry-data') {
        renderIndustryDataCard();
        document.getElementById('footer-source').textContent = 'Source: Abicalcados sector reports 2017-2025 / IBGE production segmentation';
        return;
    }
    if (activeTab === 'market-share') {
        renderMarketShareCard();
        document.getElementById('footer-source').textContent = 'Source: Euromonitor Brand Shares (Sportswear), retail value RSP. Vulcabras = Olympikus + Mizuno + Under Armour.';
        return;
    }
    if (activeTab === 'cost-index') {
        renderCostIndexCard();
        renderCostIndexTableCard();
        document.getElementById('footer-source').textContent = 'Source: Bloomberg / BigQuery table constellation_vibe_coding.sports_retail_cost_indices_weekly';
        return;
    }
    renderImportsDataCard();
    renderImportsTableCard();
    document.getElementById('footer-source').textContent = 'Source: Comex Stat / MDIC, imports by NCM 6404.11.00 and 6402.19.00';
}

document.getElementById('current-date').textContent = new Date().toLocaleDateString('en-US', { year:'numeric', month:'short', day:'2-digit' });
// renderTabs/renderContent run after DOMContentLoaded so the <template> element below is available
document.addEventListener('DOMContentLoaded', function() { renderTabs(); renderContent(); });
