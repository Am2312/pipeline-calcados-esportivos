function fmtNumberEN(value, digits=1) {
    return Number(value || 0).toLocaleString('en-US', { minimumFractionDigits: digits, maximumFractionDigits: digits });
}

function fmtPctEN(value, digits=0) {
    if (!Number.isFinite(value)) return 'n.m.';
    const abs = Math.abs(value * 100);
    const text = `${fmtNumberEN(abs, digits)}%`;
    return value < 0 ? `(${text})` : text;
}

function fmtMetric(value) {
    return fmtNumberEN(value / 1e6, 0);
}

function fmtTooltip(value) {
    if (importsState.metric === 'fob') return `US$ ${fmtNumberEN(value / 1e6, 2)}mn`;
    return `${fmtNumberEN(value / 1e6, 2)}mn pairs`;
}

function metricValue(row) {
    return importsState.metric === 'fob' ? Number(row.fob_usd || 0) : Number(row.pairs || 0);
}

function countryNameEN(name) {
    return COUNTRY_NAME_EN[name] || name || 'Unknown';
}

function periodKey(year, month) {
    return `${year}-${String(month).padStart(2, '0')}`;
}

function parsePeriodStart(key) {
    if (!key) return null;
    if (key.includes('-Q')) {
        const [year, qPart] = key.split('-Q');
        return { year: Number(year), month: (Number(qPart) - 1) * 3 + 1 };
    }
    if (key.includes('-')) {
        const [year, month] = key.split('-');
        return { year: Number(year), month: Number(month) };
    }
    return { year: Number(key), month: 1 };
}

function parsePeriodEnd(key) {
    if (!key) return null;
    if (key.includes('-Q')) {
        const [year, qPart] = key.split('-Q');
        return { year: Number(year), month: Number(qPart) * 3 };
    }
    if (key.includes('-')) {
        const [year, month] = key.split('-');
        return { year: Number(year), month: Number(month) };
    }
    return { year: Number(key), month: 12 };
}

function periodKeyForCurrentGrain(date) {
    if (!date || !Number.isFinite(date.year) || !Number.isFinite(date.month)) return null;
    if (importsState.grain === 'monthly') return periodKey(date.year, date.month);
    if (importsState.grain === 'quarterly') return `${date.year}-Q${quarterOf(date.month)}`;
    return String(date.year);
}

function monthLabel(year, month) {
    return `${MONTH_NAMES[month - 1]}/${String(year).slice(-2)}`;
}

function quarterOf(month) {
    return Math.floor((month - 1) / 3) + 1;
}

function quarterLabel(year, quarter) {
    return `${quarter}Q${String(year).slice(-2)}`;
}

function quarterLabelFull(year, quarter) {
    return `${quarter}Q${year}`;
}

function sourceRows() {
    return (window.SPORTS_IMPORTS_DATA && window.SPORTS_IMPORTS_DATA.monthlyTotal) ? window.SPORTS_IMPORTS_DATA.monthlyTotal : [];
}

function sourceCountryRows() {
    return (window.SPORTS_IMPORTS_DATA && window.SPORTS_IMPORTS_DATA.monthlyByCountry) ? window.SPORTS_IMPORTS_DATA.monthlyByCountry : [];
}

function allMonths() {
    return sourceRows().map(row => ({
        key: periodKey(row.year, row.month),
        year: row.year,
        month: row.month,
        label: monthLabel(row.year, row.month),
        value: metricValue(row),
    })).sort((a, b) => a.key.localeCompare(b.key));
}

function monthlyLtmRows(rows) {
    const out = [];
    for (let i = 0; i < rows.length; i++) {
        if (i < 11) continue;
        const windowRows = rows.slice(i - 11, i + 1);
        out.push({ ...rows[i], value: windowRows.reduce((sum, row) => sum + row.value, 0) });
    }
    return out;
}

function aggregateQuarterly(rows, ltm=false, requireComplete=true) {
    const buckets = new Map();
    rows.forEach(row => {
        const q = quarterOf(row.month);
        const key = `${row.year}-Q${q}`;
        if (!buckets.has(key)) buckets.set(key, { key, year: row.year, quarter: q, label: quarterLabel(row.year, q), months: [], value: 0 });
        const bucket = buckets.get(key);
        bucket.months.push(row);
        bucket.value += row.value;
    });
    const quarters = [...buckets.values()]
        .filter(row => !requireComplete || new Set(row.months.map(monthRow => monthRow.month)).size === 3)
        .sort((a, b) => a.key.localeCompare(b.key));
    if (!ltm) return quarters;
    return quarters.map((q, i) => {
        const start = Math.max(0, i - 3);
        if (i < 3) return null;
        return { ...q, value: quarters.slice(start, i + 1).reduce((sum, row) => sum + row.value, 0) };
    }).filter(Boolean);
}

function aggregateAnnual(rows) {
    const buckets = new Map();
    rows.forEach(row => {
        const key = String(row.year);
        if (!buckets.has(key)) buckets.set(key, { key, year: row.year, label: key, value: 0, months: 0 });
        const bucket = buckets.get(key);
        bucket.value += row.value;
        bucket.months += 1;
    });
    return [...buckets.values()].sort((a, b) => a.key.localeCompare(b.key)).map(row => ({
        ...row,
        label: row.months < 12 ? `${row.year} YTD` : String(row.year)
    }));
}

function totalSeries() {
    const monthly = allMonths();
    if (importsState.grain === 'monthly') return importsState.base === 'ltm' ? monthlyLtmRows(monthly) : monthly;
    if (importsState.grain === 'quarterly') return aggregateQuarterly(monthly, importsState.base === 'ltm');
    return aggregateAnnual(monthly);
}

function countryMonthlyBase() {
    return sourceCountryRows().map(row => ({
        key: periodKey(row.year, row.month),
        year: row.year,
        month: row.month,
        country: countryNameEN(row.country_name || row.country_code),
        value: metricValue(row),
    })).sort((a, b) => a.key.localeCompare(b.key));
}

function countrySeriesByPeriod() {
    const monthlyRows = countryMonthlyBase();
    if (importsState.grain === 'quarterly') {
        const validQuarters = aggregateQuarterly(allMonths(), false, true);
        const spotRows = validQuarters.map(q => ({ key: q.key, label: q.label, countries: {} }));
        const byKey = new Map(spotRows.map(row => [row.key, row]));
        monthlyRows.forEach(row => {
            const q = quarterOf(row.month);
            const key = `${row.year}-Q${q}`;
            const bucket = byKey.get(key);
            if (!bucket) return;
            bucket.countries[row.country] = (bucket.countries[row.country] || 0) + row.value;
        });
        if (importsState.base !== 'ltm') return spotRows;
        return spotRows.map((row, i) => {
            if (i < 3) return null;
            const countries = {};
            spotRows.slice(i - 3, i + 1).forEach(qRow => {
                Object.entries(qRow.countries).forEach(([country, value]) => {
                    countries[country] = (countries[country] || 0) + value;
                });
            });
            return { ...row, countries };
        }).filter(Boolean);
    }

    const countries = [...new Set(monthlyRows.map(row => row.country))].sort();
    const out = new Map();

    countries.forEach(country => {
        const rows = monthlyRows.filter(row => row.country === country);
        let series;
        if (importsState.grain === 'monthly') {
            const monthly = rows.map(row => ({ key: row.key, year: row.year, month: row.month, label: monthLabel(row.year, row.month), country, value: row.value }));
            series = importsState.base === 'ltm' ? monthlyLtmRows(monthly) : monthly;
        } else {
            const monthly = rows.map(row => ({ key: row.key, year: row.year, month: row.month, label: monthLabel(row.year, row.month), country, value: row.value }));
            series = aggregateAnnual(monthly).map(row => ({ ...row, country }));
        }
        series.forEach(row => {
            if (!out.has(row.key)) out.set(row.key, { key: row.key, label: row.label, countries: {} });
            out.get(row.key).countries[country] = row.value;
        });
    });
    return [...out.values()].sort((a, b) => a.key.localeCompare(b.key));
}

function ensureRange() {
    if (importsState.grain === 'annual') importsState.base = 'spot';
    const rows = totalSeries();
    if (!rows.length) return;
    const keys = rows.map(row => row.key);
    if (!importsState.from || !keys.includes(importsState.from)) importsState.from = keys[0];
    if (!importsState.to || !keys.includes(importsState.to)) importsState.to = keys[keys.length - 1];
    if (importsState.from > importsState.to) [importsState.from, importsState.to] = [importsState.to, importsState.from];
}

function filteredTotalSeries() {
    ensureRange();
    return totalSeries().filter(row => row.key >= importsState.from && row.key <= importsState.to);
}

function filteredCountryPeriods() {
    ensureRange();
    const rows = countrySeriesByPeriod().filter(row => row.key >= importsState.from && row.key <= importsState.to);
    if (importsState.grain !== 'quarterly') return rows;
    const validKeys = new Set(totalSeries().map(row => row.key));
    return rows.filter(row => validKeys.has(row.key));
}

    return metric === 'fob' ? Number(row.fob_usd || 0) : Number(row.pairs || 0);

function allMonthsForMetric(metric) {
    return sourceRows().map(row => ({
        key: periodKey(row.year, row.month),
        year: row.year,
        month: row.month,
        label: monthLabel(row.year, row.month),
        value: tableMetricValue(row, metric),
    })).sort((a, b) => a.key.localeCompare(b.key));
}

function periodSeriesForMetric(metric, state) {
    const monthly = allMonthsForMetric(metric);
    if (state.grain === 'monthly') return state.base === 'ltm' ? monthlyLtmRows(monthly) : monthly;
    if (state.grain === 'quarterly') return aggregateQuarterly(monthly, state.base === 'ltm');
    return aggregateAnnual(monthly);
}

function tablePeriodOptions() {
    if (importsTableState.grain === 'annual') importsTableState.base = 'spot';
    return periodSeriesForMetric('volume', importsTableState);
}

function ensureTableRange() {
    if (importsTableState.grain === 'annual') importsTableState.base = 'spot';
    const rows = tablePeriodOptions();
    if (!rows.length) return;
    const keys = rows.map(row => row.key);
    if (!importsTableState.from || !keys.includes(importsTableState.from)) importsTableState.from = keys[0];
    if (!importsTableState.to || !keys.includes(importsTableState.to)) importsTableState.to = keys[keys.length - 1];
    if (keys.indexOf(importsTableState.from) > keys.indexOf(importsTableState.to)) [importsTableState.from, importsTableState.to] = [importsTableState.to, importsTableState.from];
}

function importsTableRowsForMetric(metric) {
    ensureTableRange();
    const rows = periodSeriesForMetric(metric, importsTableState);
    const byKey = new Map(rows.map(row => [row.key, row]));
    const selected = rows.filter(row => row.key >= importsTableState.from && row.key <= importsTableState.to);
    return selected.map((row, idx) => {
        let yoyKey = null;
        if (importsTableState.grain === 'monthly') yoyKey = periodKey(row.year - 1, row.month);
        else if (importsTableState.grain === 'quarterly') yoyKey = `${row.year - 1}-Q${row.quarter}`;
        else yoyKey = String(row.year - 1);
        const yoyBase = byKey.get(yoyKey);
        const rowPos = rows.findIndex(item => item.key === row.key);
        const prev = rowPos > 0 ? rows[rowPos - 1] : null;
        const canAnnualYoy = importsTableState.grain !== 'annual' || (row.months === 12 && yoyBase?.months === 12);
        const yoy = canAnnualYoy && yoyBase && yoyBase.value ? row.value / yoyBase.value - 1 : null;
        const pop = prev && prev.value ? row.value / prev.value - 1 : null;
        return { ...row, displayIndex: idx, yoy, pop };
    });
}

function labelIndices(rows) {
    if (rows.length <= 30) return rows.map((_, i) => i);
    if (importsState.grain === 'monthly') {

        return rows.map((row, i) => row.month === latestMonth ? i : -1).filter(i => i >= 0);
    }
    if (importsState.grain === 'quarterly') {
        const latestQuarter = rows[rows.length - 1]?.quarter;
        return rows.map((row, i) => row.quarter === latestQuarter ? i : -1).filter(i => i >= 0);
    }
    return rows.map((_, i) => i);
}

function roundedRect(ctx, x, y, w, h, r) {
    if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(x, y, w, h, r); ctx.fill(); return; }
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
    ctx.fill();
}

function tightAxis(values, forceZeroMin=false) {
    const valid = values.filter(Number.isFinite);
    if (!valid.length) return { min: 0, max: 1 };
    const min = forceZeroMin ? 0 : Math.min(...valid);
    const max = Math.max(...valid);
    const pad = Math.max((max - min) * 0.12, max * 0.04, 1);
    return { min: Math.max(0, min - pad), max: max + pad };
}

function renderLineChart(el, rows) {
    const labels = rows.map(row => row.label);
    const values = rows.map(row => row.value);
    const axis = tightAxis(values, true);
    const indices = labelIndices(rows);
    const labelPlugin = {
        id: 'importsLineLabels',
        afterDatasetsDraw(chart) {
            const ctx = chart.ctx;
            const meta = chart.getDatasetMeta(0);
            if (!meta.visible) return;
            indices.forEach(i => {
                const point = meta.data[i];
                if (!point || !Number.isFinite(values[i])) return;
                const text = fmtMetric(values[i]);
                ctx.save();
                ctx.font = '800 10.5px Verdana';
                const bw = ctx.measureText(text).width + 12;
                const bh = 20;
                const leftPad = chart.chartArea.left + 8;
                const rightPad = chart.width - bw - 8;
                const x = Math.max(leftPad, Math.min(point.x - bw / 2, rightPad));
                const y = Math.max(chart.chartArea.top + 2, point.y - bh / 2);
                ctx.fillStyle = C.azulEscuro;
                roundedRect(ctx, x, y, bw, bh, 3);
                ctx.fillStyle = '#FFFFFF';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(text, x + bw / 2, y + bh / 2 + 0.5);
                ctx.restore();
            });
        }
    };
    importsChartInstance = new Chart(el.getContext('2d'), {
        type: 'line',
        data: { labels, datasets: [{
            label: 'Total Imports',
            data: values,
            borderColor: C.azulEscuro,
            backgroundColor: C.azulEscuro,
            borderWidth: 2.5,
            pointRadius: 0,
            pointHoverRadius: 5,
            pointHitRadius: 18,
            tension: 0.28
        }] },
        plugins: [labelPlugin],
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            layout: { padding: { left: 10, right: 54, top: 22, bottom: 0 } },
            plugins: {
                legend: { display: false },
                tooltip: { backgroundColor: 'rgba(2,28,69,0.94)', titleColor: '#9AA8BB', bodyColor: '#FFFFFF', borderColor: '#344F75', borderWidth: 1, cornerRadius: 8, padding: 12, callbacks: { label: c => `  Total Imports: ${fmtTooltip(c.parsed.y)}` } }
            },

            }
        }
    });
    bindLegendToggles(importsChartInstance);
}

function renderStackedChart(el, periods) {
    const countryTotals = {};
    periods.forEach(period => {
        Object.entries(period.countries).forEach(([country, value]) => {
            countryTotals[country] = (countryTotals[country] || 0) + value;
        });
    });
    const topCountries = Object.entries(countryTotals).sort((a, b) => b[1] - a[1]).slice(0, 3).map(([country]) => country);
    const keys = [...topCountries, 'Others'];
    const labels = periods.map(row => row.label);
    const datasets = keys.map((key, idx) => ({
        label: key,
        data: periods.map(period => {
            if (key !== 'Others') return period.countries[key] || 0;
            return Object.entries(period.countries).reduce((sum, [country, value]) => topCountries.includes(country) ? sum : sum + value, 0);
        }),
        backgroundColor: COUNTRY_PALETTE[idx],
        borderColor: COUNTRY_PALETTE[idx],
        borderWidth: 0,
        borderRadius: idx === keys.length - 1 ? { topLeft: 3, topRight: 3, bottomLeft: 0, bottomRight: 0 } : 0,
        borderSkipped: false,
        stack: 'imports'
    }));
    const totals = periods.map((_, i) => datasets.reduce((sum, ds) => sum + (ds.data[i] || 0), 0));
    const axis = tightAxis(totals, true);
    document.getElementById('imports-country-legend').innerHTML = legendHtml(keys.map((key, i) => ({ label: key, color: COUNTRY_PALETTE[i] })));

    const labelPlugin = {
        id: 'importsStackLabels',
        afterDatasetsDraw(chart) {
            const ctx = chart.ctx;
            const chartArea = chart.chartArea;
            ctx.save();
            ctx.font = '800 10.5px Verdana';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            chart.data.datasets.forEach((ds, di) => {
                const meta = chart.getDatasetMeta(di);
                if (!meta.visible) return;
                meta.data.forEach((bar, i) => {
                    const value = ds.data[i];
                    if (!Number.isFinite(value) || value <= 0) return;
                    const props = bar.getProps(['x', 'y', 'base', 'width'], true);
                    const h = Math.abs(props.base - props.y);
                    if (h < 22 || props.width < 30) return;
                    const text = fmtMetric(value);
                    if (ctx.measureText(text).width > props.width - 6) return;
                    ctx.fillStyle = di === 1 ? C.azulEscuro : '#FFFFFF';
                    ctx.fillText(text, props.x, props.y + h / 2);
                });
            });
            totals.forEach((_, i) => {
                let value = 0;
                let topBar = null;
                for (let di = 0; di < chart.data.datasets.length; di++) {
                    if (!chart.isDatasetVisible(di)) continue;
                    const dsValue = chart.data.datasets[di].data[i] || 0;
                    if (!Number.isFinite(dsValue) || dsValue <= 0) continue;
                    value += dsValue;
                    topBar = chart.getDatasetMeta(di).data[i];
                }
                if (!topBar || !Number.isFinite(value) || value <= 0) return;
                const x = topBar.x;
                const y = Math.max(chartArea.top + 10, topBar.y - 12);
                const text = fmtMetric(value);
                ctx.fillStyle = C.azulEscuro60;
                ctx.fillText(text, x, y + 0.5);
            });
            ctx.restore();
        }
    };
    importsChartInstance = new Chart(el.getContext('2d'), {
        type: 'bar',
        data: { labels, datasets },
        plugins: [labelPlugin],
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            layout: { padding: { left: 10, right: 18, top: 36, bottom: 0 } },
            plugins: {
                legend: { display: false },
                tooltip: { backgroundColor: 'rgba(2,28,69,0.94)', titleColor: '#9AA8BB', bodyColor: '#FFFFFF', borderColor: '#344F75', borderWidth: 1, cornerRadius: 8, padding: 12, callbacks: { label: c => `  ${c.dataset.label}: ${fmtTooltip(c.parsed.y)}` } }
            },
            scales: {
                x: { stacked: true, ticks: { minRotation: importsState.grain === 'annual' ? 0 : 90, maxRotation: importsState.grain === 'annual' ? 0 : 90, autoSkip: importsState.grain !== 'annual', autoSkipPadding: 8, color: C.azulEscuro40, font: { size: 10, family: 'Verdana' } }, grid: { display: false }, border: { display: true, color: '#C9D3DF', width: 1 } },
                y: { stacked: true, min: 0, max: axis.max, ticks: { display: true, maxTicksLimit: 5, color: C.azulEscuro40, padding: 7, font: { size: 10, family: 'Verdana' }, callback: value => fmtMetric(value) }, grid: { display: false }, border: { display: true, color: '#C9D3DF', width: 1 } }
            }
        }
    });
    bindLegendToggles(importsChartInstance);
}

function industryData() {
    return window.SPORTS_INDUSTRY_DATA || { reportSeries: [], bestAvailable: [], methodology: [] };
}

function sourceReportYear(label) {
    const match = String(label || '').match(/20\d\d/);
    return match ? match[0] : '';
}

function industryRevisionMatrix() {
    const rows = industryData().reportSeries || [];
    const dataYears = [...new Set(rows.map(row => row.data_year))].sort((a, b) => a - b);
    const reportYears = [...new Set(rows.map(row => row.report_year))].sort((a, b) => a - b);
    return dataYears.map(year => {
        const byReport = {};
        rows.filter(row => row.data_year === year).forEach(row => { byReport[row.report_year] = row; });
        const versions = reportYears.map(reportYear => byReport[reportYear]).filter(Boolean);
        const first = versions[0];
        const last = versions[versions.length - 1];
        return { data_year: year, byReport, first, last, delta: first && last ? last.apparent_consumption_mn - first.apparent_consumption_mn : null };
    });
}

function yoyFromIndustry(row, idx, rows) {
    if (!idx || !rows[idx - 1]?.apparent_consumption_mn) return null;
    return row.apparent_consumption_mn / rows[idx - 1].apparent_consumption_mn - 1;
}

function bindIndustryLegend(chart) {
    document.querySelectorAll('#industry-data-card .chart-legend-item[data-dataset-index]').forEach(item => {
        const toggle = () => {
            const idx = Number(item.dataset.datasetIndex);
            chart.setDatasetVisibility(idx, !chart.isDatasetVisible(idx));
            chart.update();
            document.querySelectorAll('#industry-data-card .chart-legend-item[data-dataset-index]').forEach(legendItem => {
                const legendIdx = Number(legendItem.dataset.datasetIndex);
                legendItem.classList.toggle('is-hidden', !chart.isDatasetVisible(legendIdx));
            });
        };
        item.addEventListener('click', toggle);
        item.addEventListener('keydown', event => {
            if (event.key !== 'Enter' && event.key !== ' ') return;
            event.preventDefault();
            toggle();
        });
    });
    document.querySelectorAll('#industry-data-card .chart-legend-item[data-dataset-index]').forEach(legendItem => {
        const legendIdx = Number(legendItem.dataset.datasetIndex);
        legendItem.classList.toggle('is-hidden', !chart.isDatasetVisible(legendIdx));
    });
}

function yoyForIndustryMetric(row, metric) {
    const prior = sectorRows().find(item => item.data_year === row.data_year - 1);
    const priorValue = Number(prior?.[metric]);
    const value = Number(row?.[metric]);
    return priorValue ? value / priorValue - 1 : null;
}

function sectorCagr(rows, metric) {
    if (rows.length < 2) return null;
    const first = rows[0];
    const last = rows[rows.length - 1];
    const firstValue = Number(first?.[metric]);
    const lastValue = Number(last?.[metric]);
    const years = Number(last?.data_year) - Number(first?.data_year);
    if (!firstValue || !lastValue || years <= 0) return null;
    return Math.pow(lastValue / firstValue, 1 / years) - 1;
}

function sectorPctCell(value, style='') {
    const finite = Number.isFinite(value);
    const color = !finite ? C.azulEscuro40 : value < 0 ? '#B0002A' : '#00857D';

}

        ${rows.map(row => `<td style="font-weight:800;">${fmtNumberEN(row[metric], 1)}</td>`).join('')}
        <td class="cagr-cell" style="color:${Number.isFinite(cagr) && cagr < 0 ? '#B0002A' : C.azulEscuro};">${Number.isFinite(cagr) ? fmtPctEN(cagr, 0) : 'n.m.'}</td>

}

function vulcabrasAnnualVolumeRows() {
    const annualRows = window.VULCABRAS_VOLUME_DATA?.annualRows || [];
    if (annualRows.length) {
        return annualRows.map(row => ({
            year: Number(row.year),
            quarters: 4,
            volumeMn: Number(row.athletic_footwear_volume_k_pairs) / 1000,
        })).filter(row => Number.isFinite(row.year) && Number.isFinite(row.volumeMn))
            .sort((a, b) => a.year - b.year);
    }
    const groups = new Map();
    vulcabrasVolumeRows().forEach(row => {
        if (!groups.has(row.year)) groups.set(row.year, { year: row.year, quarters: 0, volumeMn: 0 });
        const item = groups.get(row.year);
        item.quarters += 1;
        item.volumeMn += row.value / 1000;
    });
    return Array.from(groups.values())
        .filter(row => row.quarters === 4)
        .sort((a, b) => a.year - b.year);
}

function vulcabrasMarketShareRows() {
    const abicalByYear = new Map(sectorRows().map(row => [Number(row.data_year), row]));
    return vulcabrasAnnualVolumeRows().map(row => {
        const abical = abicalByYear.get(row.year);

function vulcabrasShareAxis(values) {
    const valid = values.filter(Number.isFinite);
    if (!valid.length) return { min: 0, max: 0.25, step: 0.05 };
    const min = Math.min(...valid);
    const max = Math.max(...valid);
    const range = Math.max(max - min, 0.04);
    const pad = Math.max(range * 0.55, 0.04);
    const step = range <= 0.08 ? 0.02 : 0.05;
    return {
        min: Math.max(0, Math.floor((min - pad) / step) * step),
        max: Math.ceil((max + pad) / step) * step,
        step,
    };
}

    const labelPlugin = {
        id: 'vulcabrasShareLabels',
        afterDraw(chart) {
            const { ctx, chartArea } = chart;
            ctx.save();
            ctx.strokeStyle = '#C9D3DF';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(Math.max(0, chartArea.left - 42), chartArea.bottom);
            ctx.lineTo(Math.min(chart.width, chartArea.right + 42), chartArea.bottom);
            ctx.stroke();
            ctx.restore();
        },
        afterDatasetsDraw(chart) {
            const ctx = chart.ctx;
            const badgesByIndex = new Map();
            ctx.save();
            ctx.font = '800 11px Verdana';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            chart.data.datasets.forEach((dataset, datasetIndex) => {
                if (!chart.isDatasetVisible(datasetIndex)) return;
                const meta = chart.getDatasetMeta(datasetIndex);
                (meta.data || []).forEach((point, i) => {
                    const value = dataset.data[i];
                    if (!point || !Number.isFinite(value)) return;
                    const text = fmtPctEN(value, 0);
                    const width = ctx.measureText(text).width + 14;
                    const height = 22;
                    if (!badgesByIndex.has(i)) badgesByIndex.set(i, []);
                    badgesByIndex.get(i).push({
                        text,
                        color: dataset.borderColor,
                        x: point.x - width / 2,
                        desiredY: point.y - height / 2,
                        width,
                        height,
                    });
                });
            });
            badgesByIndex.forEach(badges => {
                badges.sort((a, b) => a.desiredY - b.desiredY);
                const gap = 4;
                badges.forEach((badge, index) => {
                    const minY = index ? badges[index - 1].y + badges[index - 1].height + gap : chart.chartArea.top + 2;
                    badge.y = Math.max(minY, Math.min(badge.desiredY, chart.chartArea.bottom - badge.height - 2));
                });
                const overflow = badges.length ? badges[badges.length - 1].y + badges[badges.length - 1].height - (chart.chartArea.bottom - 2) : 0;
                if (overflow > 0) badges.forEach(badge => { badge.y = Math.max(chart.chartArea.top + 2, badge.y - overflow); });
                badges.forEach(badge => {
                    badge.x = Math.max(2, Math.min(badge.x, chart.width - badge.width - 2));
                    ctx.fillStyle = badge.color;
                    roundedRect(ctx, badge.x, badge.y, badge.width, badge.height, 4);
                    ctx.fill();
                    ctx.fillStyle = '#FFFFFF';
                    ctx.fillText(badge.text, badge.x + badge.width / 2, badge.y + badge.height / 2 + 0.5);
                });
            });
            ctx.restore();
        }
    };
    vulcabrasShareChartInstance = new Chart(el.getContext('2d'), {
        type: 'line',
        data: { labels, datasets: [

            layout: { padding: { left: 52, right: 52, top: 18, bottom: 0 } },

function bindVulcabrasShareLegend(chart) {

        item.classList.toggle('is-hidden', !chart.isDatasetVisible(Number(item.dataset.datasetIndex)));

    document.querySelectorAll('#vulcabras-share-card .chart-legend-item[data-dataset-index]').forEach(item => {
        const toggle = () => {
            const index = Number(item.dataset.datasetIndex);
            chart.setDatasetVisibility(index, !chart.isDatasetVisible(index));
            chart.update();
            sync();
        };
        item.addEventListener('click', toggle);

            event.preventDefault();
            toggle();
        });
    });
    sync();
}

function niceSectorAxisMax(maxValue) {
    const raw = Math.max(Number(maxValue || 0) * 1.12, 1);

    if (raw <= 100) return Math.ceil(raw / 10) * 10;
    return Math.ceil(raw / 20) * 20;
}

// ===== Sportswear TAM (Euromonitor) — first cards in Sector Data =====
// Source: Sportswear_Euromonitor.xlsx. Sportswear = Apparel + Footwear (BRL million, current prices).
// 2011-2024 from Market size sheet; 2025 from Company/Brand shares totals (Footwear = Sportswear - Apparel).
const SPORTSWEAR_TAM = {
    years:    [2011, 2012, 2013, 2014, 2015, 2016, 2017, 2018, 2019, 2020, 2021, 2022, 2023, 2024, 2025],
    apparel:  [9226.8, 10144.8, 11181.6, 11763.1, 11390.2, 10477.8, 11611, 11238, 11044.1, 9920.4, 10836.3, 11345.8, 12457.7, 13686, 15322.4],
    footwear: [10275.3, 11211.8, 12278, 13697.3, 13278.2, 12709.9, 13008.4, 13355.2, 14077.8, 11732.6, 13769, 14778.9, 16679.2, 18717.4, 21486.7]
};
const TAM_STATE = { from: 2011, to: 2025 };
const TAM_TABLE_STATE = { from: 2011, to: 2025 };
let tamChart = null;

function tamFmtNum(v, d = 0) { return Number(v || 0).toLocaleString('en-US', { minimumFractionDigits: d, maximumFractionDigits: d }); }
function tamFmtPct(v, d = 0) { return Number.isFinite(v) ? `${tamFmtNum(v, d)}%` : 'n.a.'; }
function tamCagrCalc(s, e, p) { if (!Number.isFinite(s) || !Number.isFinite(e) || s <= 0 || e <= 0 || p <= 0) return null; return (Math.pow(e / s, 1 / p) - 1) * 100; }
function tamYoySeries(vals) { return vals.map((v, i) => (i === 0 || !vals[i - 1]) ? null : ((v / vals[i - 1]) - 1) * 100); }

function getTamSeries(state) {
    const years = SPORTSWEAR_TAM.years;
    const fromIndex = years.indexOf(state.from);
    const toIndex = years.indexOf(state.to);
    const apMn = SPORTSWEAR_TAM.apparel, ftMn = SPORTSWEAR_TAM.footwear;
    const totalMn = years.map((_, i) => apMn[i] + ftMn[i]);
    const bn = arr => arr.map(v => v / 1000);
    return {
        years: years.slice(fromIndex, toIndex + 1),
        values: bn(totalMn).slice(fromIndex, toIndex + 1),
        stackedSeries: [
            { key: 'footwear', label: 'Footwear', color: C.azulEscuro, values: bn(ftMn).slice(fromIndex, toIndex + 1) },
            { key: 'apparel', label: 'Apparel', color: C.turquesa, values: bn(apMn).slice(fromIndex, toIndex + 1) }
        ],
        yoy: tamYoySeries(totalMn).slice(fromIndex, toIndex + 1),
        cagr: tamCagrCalc(totalMn[fromIndex], totalMn[toIndex], toIndex - fromIndex),
        apparelCagr: tamCagrCalc(apMn[fromIndex], apMn[toIndex], toIndex - fromIndex),
        footwearCagr: tamCagrCalc(ftMn[fromIndex], ftMn[toIndex], toIndex - fromIndex),
        lineColor: C.cereja
    };
}

function buildTamComboChart(canvas, selected) {
    if (!canvas) return null;
    const labels = selected.years;
    const yoyData = selected.yoy;
    const lineColor = selected.lineColor || C.cereja;
    const barData = selected.values;
    const barMax = Math.max(...barData) * 1.12;
    const yoyValues = yoyData.filter(Number.isFinite);
    const yoyObservedMax = Math.max(...yoyValues, 0);
    const yoyObservedMin = Math.min(...yoyValues, 0);
    const yoyRange = Math.max(10, yoyObservedMax - yoyObservedMin);
    const yoyScaleMax = Math.ceil(yoyObservedMax + Math.max(4, yoyRange * 0.08));
    const yoyScaleMin = Math.floor(yoyObservedMin - Math.max(4, yoyRange * 0.10));
    const datasets = [];
    selected.stackedSeries.forEach(s => datasets.push({
        type: 'bar', label: s.label, data: s.values, stack: 'tam', yAxisID: 'y', order: 2,
        backgroundColor: s.color, borderColor: s.color, borderWidth: 0, borderSkipped: false,
        barPercentage: 0.74, categoryPercentage: 0.88
    }));
    datasets.push({
        type: 'line', label: 'YoY', data: yoyData, yAxisID: 'y1', order: 1,
        borderColor: lineColor, backgroundColor: lineColor, borderWidth: 2.5,
        pointRadius: 3, pointBackgroundColor: lineColor, pointBorderColor: lineColor,
        pointHoverRadius: 5, pointHitRadius: 18, tension: 0.25
    });
    const labelPlugin = {
        id: 'tamLabels',
        afterDatasetsDraw(chart) {
            const { ctx, chartArea } = chart;
            const lineIndex = chart.data.datasets.findIndex(ds => ds.type === 'line');
            const lineMeta = lineIndex >= 0 ? chart.getDatasetMeta(lineIndex) : null;
            const lineVisible = lineIndex >= 0 && chart.isDatasetVisible(lineIndex);
            const yoyBoxes = [];
            const barInfos = [];
            chart.data.datasets.forEach((ds, idx) => {
                if (ds.type === 'bar' && chart.isDatasetVisible(idx)) barInfos.push({ meta: chart.getDatasetMeta(idx), data: ds.data });
            });
            const stackTops = labels.map((_, index) => {
                let topY = null, barRef = null, sum = 0;
                barInfos.forEach(info => {
                    const bar = info.meta.data[index];
                    if (!bar) return;
                    if (topY === null || bar.y < topY) { topY = bar.y; barRef = bar; }
                    const val = info.data[index];
                    if (Number.isFinite(val)) sum += val;
                });
                return { topY, barRef, sum };
            });
            ctx.save();
            ctx.font = '700 11px Verdana';
            if (lineMeta && lineVisible) lineMeta.data.forEach((point, index) => {
                const value = yoyData[index];
                if (!point || !Number.isFinite(value)) return;
                const text = `${Math.round(value)}%`;
                const width = ctx.measureText(text).width + 14;
                const height = 22;
                let x = point.x - width / 2;
                let y = point.y - height / 2;
                x = Math.max(chartArea.left + 2, Math.min(x, chartArea.right - width - 2));
                y = Math.max(chartArea.top + 4, y);
                yoyBoxes[index] = { x, y, width, height };
            });
            ctx.restore();
            ctx.save();
            ctx.font = '700 12px Verdana';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = C.branco;
            chart.data.datasets.forEach((ds, idx) => {
                if (ds.type !== 'bar' || !chart.isDatasetVisible(idx)) return;
                const meta = chart.getDatasetMeta(idx);
                meta.data.forEach((bar, i) => {
                    const value = ds.data[i];
                    if (!bar || !Number.isFinite(value)) return;
                    const segHeight = Math.abs(bar.base - bar.y);
                    if (segHeight < 18) return;
                    const labelX = bar.x;
                    let labelY = bar.y + (bar.base - bar.y) / 2;
                    const segTotal = stackTops[i] ? stackTops[i].sum : 0;
                    const text = segTotal > 0 ? `${Math.round((value / segTotal) * 100)}%` : '';
                    const box = yoyBoxes[i];
                    if (box) {
                        const tw = ctx.measureText(text).width;
                        const overlapsX = Math.abs(labelX - (box.x + box.width / 2)) < ((tw + box.width) / 2);
                        const overlapsY = Math.abs(labelY - (box.y + box.height / 2)) < ((16 + box.height) / 2);
                        if (overlapsX && overlapsY) {
                            const segTop = Math.min(bar.y, bar.base), segBottom = Math.max(bar.y, bar.base);
                            const candDown = box.y + box.height + 9, candUp = box.y - 9;
                            if ((box.y + box.height / 2) <= labelY && candDown + 8 <= segBottom - 2) labelY = candDown;
                            else if (candUp - 8 >= segTop + 2) labelY = candUp;
                            else if (candDown + 8 <= segBottom - 2) labelY = candDown;
                            labelY = Math.max(segTop + 10, Math.min(segBottom - 10, labelY));
                        }
                    }
                    ctx.fillText(text, labelX, labelY);
                });
            });
            ctx.fillStyle = C.azulEscuro;
            stackTops.forEach((stack, index) => {
                if (!stack || stack.topY == null || !stack.barRef) return;
                const text = tamFmtNum(stack.sum, 0);
                let labelX = stack.barRef.x;
                let labelY = Math.max(chartArea.top + 9, stack.topY - 12);
                const box = yoyBoxes[index];
                if (box) {
                    const tw = ctx.measureText(text).width;
                    const overlapsX = Math.abs(labelX - (box.x + box.width / 2)) < ((tw + box.width) / 2);
                    const overlapsY = Math.abs(labelY - (box.y + box.height / 2)) < ((14 + box.height) / 2);
                    if (overlapsX && overlapsY) labelY = Math.max(chartArea.top + 9, box.y - 11);
                }
                ctx.fillText(text, labelX, labelY);
            });
            ctx.font = '700 11px Verdana';
            ctx.textBaseline = 'middle';
            if (lineMeta && lineVisible) lineMeta.data.forEach((point, index) => {
                const value = yoyData[index];
                if (!point || !Number.isFinite(value)) return;
                const text = `${Math.round(value)}%`;
                const width = ctx.measureText(text).width + 14;
                const height = 22;
                const box = yoyBoxes[index] || { x: Math.max(chartArea.left + 2, Math.min(point.x - width / 2, chartArea.right - width - 2)), y: Math.max(chartArea.top + 4, point.y - 11) };
                ctx.fillStyle = lineColor;
                roundedRect(ctx, box.x, box.y, width, height, 4);
                ctx.fill();
                ctx.fillStyle = C.branco;
                ctx.fillText(text, box.x + width / 2, box.y + height / 2 + 0.5);
            });
            ctx.restore();
        }
    };
    return new Chart(canvas.getContext('2d'), {
        type: 'bar', plugins: [labelPlugin], data: { labels, datasets },
        options: {
            responsive: true, maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            layout: { padding: { top: 52, right: 26, left: 0, bottom: 0 } },
            plugins: {
                legend: { display: false },
                tooltip: {
                    backgroundColor: 'rgba(2,28,69,0.94)', titleColor: '#9AA8BB', bodyColor: '#FFFFFF',
                    borderColor: '#344F75', borderWidth: 1, cornerRadius: 8, padding: 12,
                    callbacks: {
                        label(ctx2) {
                            const v = ctx2.parsed.y;
                            if (ctx2.dataset.yAxisID === 'y1') return v == null ? '' : `  YoY: ${tamFmtPct(v, 1)}`;
                            return `  ${ctx2.dataset.label}: R$ ${tamFmtNum(v, 1)} bn`;
                        },
                        footer(items) {
                            const total = items.filter(c => c.dataset.yAxisID !== 'y1').reduce((sum, c) => sum + (Number.isFinite(c.parsed.y) ? c.parsed.y : 0), 0);
                            return total ? `  Total: R$ ${tamFmtNum(total, 1)} bn` : '';
                        }
                    }
                }
            },
            scales: {
                x: { stacked: true, ticks: { color: C.azulEscuro40, font: { family: 'Verdana', size: 10.5 }, minRotation: 0, maxRotation: 0 }, grid: { display: false }, border: { color: C.azulEscuro20 } },
                y: { stacked: true, min: 0, max: barMax, ticks: { display: false }, grid: { display: false }, border: { display: false } },
                y1: { position: 'right', min: yoyScaleMin, max: yoyScaleMax, ticks: { display: false }, grid: { display: false, drawOnChartArea: false }, border: { display: false } }
            }
        }
    });
}

function bindTamLegend(chart) {
    if (!chart) return;
    const sync = () => document.querySelectorAll('#tam-chart-card .chart-legend-item[data-dataset-index]').forEach(it => {
        it.classList.toggle('is-hidden', !chart.isDatasetVisible(Number(it.dataset.datasetIndex)));
    });
    document.querySelectorAll('#tam-chart-card .chart-legend-item[data-dataset-index]').forEach(item => {
        const toggle = () => {
            const idx = Number(item.dataset.datasetIndex);
            chart.setDatasetVisibility(idx, !chart.isDatasetVisible(idx));
            chart.update();
            sync();
        };
        item.addEventListener('click', toggle);
        item.addEventListener('keydown', event => {
            if (event.key !== 'Enter' && event.key !== ' ') return;
            event.preventDefault();
            toggle();
        });
    });
    sync();
}

// ===== Footwear value-growth decomposition: Price x Volume =====
// Total = YoY of Footwear retail value (Euromonitor). Volume = YoY of apparent
// consumption (Abicalcados). Price derived: (1+price) = (1+total)/(1+volume).
const FOOTWEAR_DECOMP_STATE = { from: 2016, to: 2024 };
let footwearDecompChart = null;

function footwearDecompAllYears() {
    const ac = new Map((window.SPORTS_INDUSTRY_DATA?.bestAvailable || []).map(r => [Number(r.data_year), Number(r.apparent_consumption_mn)]));
    const years = SPORTSWEAR_TAM.years, ft = SPORTSWEAR_TAM.footwear;
    const out = [];
    years.forEach((y, i) => {
        if (i === 0) return;
        const totalYoy = (ft[i] && ft[i - 1]) ? ft[i] / ft[i - 1] - 1 : null;
        const vNow = ac.get(y), vPrev = ac.get(y - 1);
        const volYoy = (Number.isFinite(vNow) && Number.isFinite(vPrev) && vPrev) ? vNow / vPrev - 1 : null;
        if (totalYoy == null || volYoy == null) return;
        const priceYoy = (1 + totalYoy) / (1 + volYoy) - 1;
        out.push({ year: y, total: totalYoy * 100, volume: volYoy * 100, price: priceYoy * 100 });
    });
    return out;
}

function getFootwearDecompSeries() {
    const all = footwearDecompAllYears();
    if (!all.length) return [];
    const yrs = all.map(d => d.year);
    let from = FOOTWEAR_DECOMP_STATE.from, to = FOOTWEAR_DECOMP_STATE.to;
    if (!yrs.includes(from)) from = yrs[0];
    if (!yrs.includes(to)) to = yrs[yrs.length - 1];
    if (from > to) [from, to] = [to, from];
    return all.filter(d => d.year >= from && d.year <= to);
}

function decompPctLabel(v) { return v < 0 ? `(${Math.abs(Math.round(v))}%)` : `${Math.round(v)}%`; }

function buildFootwearDecompChart(canvas, series) {
    if (!canvas || !series.length) return null;
    const labels = series.map(d => String(d.year));
    const priceData = series.map(d => d.price);
    const volData = series.map(d => d.volume);
    const extents = series.flatMap(d => [Math.max(0, d.price) + Math.max(0, d.volume), Math.min(0, d.price) + Math.min(0, d.volume), d.total]);
    const yHi = Math.max(...extents, 0), yLo = Math.min(...extents, 0);
    const range = Math.max(8, yHi - yLo);
    const yMax = yHi + Math.max(8, range * 0.24);
    const yMin = yLo - Math.max(2, range * 0.08);
    const datasets = [
        { type: 'bar', label: 'Price', data: priceData, stack: 'g', backgroundColor: C.azulEscuro, borderColor: C.azulEscuro, borderWidth: 0, borderSkipped: false, barPercentage: 0.7, categoryPercentage: 0.86 },
        { type: 'bar', label: 'Volume', data: volData, stack: 'g', backgroundColor: C.turquesa, borderColor: C.turquesa, borderWidth: 0, borderSkipped: false, barPercentage: 0.7, categoryPercentage: 0.86 }
    ];
    const labelPlugin = {
        id: 'decompLabels',
        beforeDatasetsDraw(chart) {
            const { ctx, chartArea, scales: { y: yScale } } = chart;
            const y0 = yScale.getPixelForValue(0);
            ctx.save();
            ctx.strokeStyle = '#C2CCD6';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(chartArea.left, y0);
            ctx.lineTo(chartArea.right, y0);
            ctx.stroke();
            ctx.restore();
        },
        afterDatasetsDraw(chart) {
            const { ctx, scales: { y: yScale } } = chart;
            const meta0 = chart.getDatasetMeta(0);
            ctx.save();
            ctx.font = '700 11px Verdana';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            chart.data.datasets.forEach((ds, di) => {
                if (!chart.isDatasetVisible(di)) return;
                const meta = chart.getDatasetMeta(di);
                meta.data.forEach((bar, i) => {
                    const v = ds.data[i];
                    if (!Number.isFinite(v) || Math.abs(bar.base - bar.y) < 15) return;
                    ctx.fillStyle = C.branco;
                    ctx.fillText(decompPctLabel(v), bar.x, (bar.y + bar.base) / 2);
                });
            });
            ctx.font = '700 11px Verdana';
            series.forEach((d, i) => {
                const bar = meta0.data[i];
                if (!bar) return;
                const posSum = Math.max(0, chart.isDatasetVisible(0) ? d.price : 0) + Math.max(0, chart.isDatasetVisible(1) ? d.volume : 0);
                const topY = yScale.getPixelForValue(posSum);
                const text = decompPctLabel(d.total);
                const w = ctx.measureText(text).width + 14, hgt = 22;
                const x = bar.x - w / 2, yy = topY - hgt - 4;
                ctx.fillStyle = C.cereja;
                roundedRect(ctx, x, yy, w, hgt, 4);
                ctx.fill();
                ctx.fillStyle = C.branco;
                ctx.fillText(text, bar.x, yy + hgt / 2 + 0.5);
            });
            ctx.restore();
        }
    };
    return new Chart(canvas.getContext('2d'), {
        type: 'bar', plugins: [labelPlugin], data: { labels, datasets },
        options: {
            responsive: true, maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            layout: { padding: { top: 40, right: 26, left: 0, bottom: 0 } },
            plugins: {
                legend: { display: false },
                tooltip: {
                    backgroundColor: 'rgba(2,28,69,0.94)', titleColor: '#9AA8BB', bodyColor: '#FFFFFF',
                    borderColor: '#344F75', borderWidth: 1, cornerRadius: 8, padding: 12,
                    callbacks: {
                        label(ctx2) { return `  ${ctx2.dataset.label}: ${tamFmtPct(ctx2.parsed.y, 1)}`; },
                        footer(items) { const i = items[0]?.dataIndex; return (i != null && series[i]) ? `  Total: ${tamFmtPct(series[i].total, 1)}` : ''; }
                    }
                }
            },
            scales: {
                x: { stacked: true, ticks: { color: C.azulEscuro40, font: { family: 'Verdana', size: 10.5 }, minRotation: 0, maxRotation: 0 }, grid: { display: false }, border: { color: C.azulEscuro20 } },
                y: { stacked: true, min: yMin, max: yMax, ticks: { display: false }, grid: { display: false }, border: { display: false } }
            }
        }
    });
}

// ===== Market Share tab (Euromonitor Brand Shares) =====
const MS_VULCABRAS = ['Olympikus', 'Mizuno', 'Under Armour'];
const MS_PALETTE = ['#021C45', '#72D1C6', '#FF5473', '#2EA5F5', '#6D7E98', '#6A2C70', '#9AA8BB', '#CCD4DD'];
const MS_OTHERS_COLOR = '#D02BB8';
const MS_TOP_SERIES = 6;
const MS_STATE = { category: 'footwear', from: 2016, to: 2025, vulcabras: 'separate', shareBasis: 'named' };
const VULCABRAS_SHARE_STATE = { frequency: 'annual', from: 2016, to: 2025 };
const MS_BRAND_GMV_CHART_STATE = { brand: 'Vulcabras', from: 2016, to: 2025 };
const MS_BRAND_GMV_TABLE_STATE = { brand: 'Vulcabras', from: 2016, to: 2025 };
let marketShareChart = null;
let marketShareBrandGmvChart = null;

function msData() { return window.SPORTSWEAR_BRAND_SHARES || { years: [], totals: {}, brands: {} }; }

function msDenominatorSeries(category, basis) {
    const d = msData();
    const years = d.years || [];
    const brands = d.brands[category] || {};
    if (basis === 'named') {
        return years.map((_, index) => Object.values(brands).reduce((sum, values) => sum + (Number.isFinite(values?.[index]) ? Number(values[index]) : 0), 0));
    }
    return (d.totals[category] || []).map(value => Number(value || 0));
}

function getMarketShareModel() {
    const d = msData();
    const years = d.years || [];
    if (!years.length) return null;
    const cat = MS_STATE.category;
    let fromIdx = years.indexOf(MS_STATE.from), toIdx = years.indexOf(MS_STATE.to);
    if (fromIdx < 0) fromIdx = 0;
    if (toIdx < 0) toIdx = years.length - 1;
    if (fromIdx > toIdx) [fromIdx, toIdx] = [toIdx, fromIdx];
    const shownYears = years.slice(fromIdx, toIdx + 1);
    const brands = d.brands[cat] || {};
    const totals = msDenominatorSeries(cat, MS_STATE.shareBasis);
    const val = (name, i) => (brands[name] && Number.isFinite(brands[name][i])) ? brands[name][i] : 0;
    const rankIdx = toIdx;
    const rankShare = members => {
        const tot = totals[rankIdx] || 0;
        return tot ? members.reduce((sum, member) => sum + val(member, rankIdx), 0) / tot * 100 : 0;
    };
    const withRank = entry => ({ ...entry, rankShare: rankShare(entry.members) });
    const vulcEntries = MS_STATE.vulcabras === 'combined'
        ? [withRank({ key: 'Vulcabras', label: 'Vulcabras', members: MS_VULCABRAS.filter(n => brands[n]) })]
        : MS_VULCABRAS.filter(n => brands[n]).map(n => withRank({ key: n, label: n, members: [n] }));
    const fixedEntries = vulcEntries.filter(entry => entry.members.length && entry.rankShare > 0);
    const rankedCompetitors = Object.keys(brands)
        .filter(n => !MS_VULCABRAS.includes(n))
        .map(n => withRank({ key: n, label: n, members: [n] }))
        .filter(entry => entry.rankShare > 0)
        .sort((a, b) => b.rankShare - a.rankShare || a.label.localeCompare(b.label));
    const entries = fixedEntries.concat(rankedCompetitors.slice(0, Math.max(0, MS_TOP_SERIES - fixedEntries.length)));
    const series = entries.map((e, ei) => ({
        key: e.key, label: e.label, color: MS_PALETTE[ei % MS_PALETTE.length],
        data: shownYears.map((_, si) => {
            const i = fromIdx + si, tot = totals[i] || 0;
            return tot ? e.members.reduce((s, m) => s + val(m, i), 0) / tot * 100 : 0;
        })
    }));
    series.push({
        key: 'Others',
        label: 'Others',
        color: MS_OTHERS_COLOR,
        data: shownYears.map((_, si) => Math.max(0, 100 - series.reduce((s, ser) => s + ser.data[si], 0)))
    });
    return { years: shownYears, fromIdx, toIdx, series };
}

function msFmtPct(value, digits = 1) {
    if (!Number.isFinite(value)) return 'n.a.';
    const rounded = Number(value.toFixed(digits));
    return `${rounded.toLocaleString('en-US', { minimumFractionDigits: digits, maximumFractionDigits: digits })}%`;
}

function msFmtPp(value, digits = 1) {
    if (!Number.isFinite(value)) return 'n.a.';
    const rounded = Number(value.toFixed(digits));
    return `${rounded > 0 ? '+' : ''}${rounded.toLocaleString('en-US', { minimumFractionDigits: digits, maximumFractionDigits: digits })}pp`;
}

function msYoySeries(values) {
    return values.map((value, index) => index === 0 || !Number.isFinite(values[index - 1]) || values[index - 1] === 0 ? null : ((value / values[index - 1]) - 1) * 100);
}

function msCagr(startValue, endValue, periods) {
    if (!Number.isFinite(startValue) || !Number.isFinite(endValue) || startValue <= 0 || endValue <= 0 || periods <= 0) return null;
    return (Math.pow(endValue / startValue, 1 / periods) - 1) * 100;
}

function msYoyHeatText(value) {
    if (!Number.isFinite(value)) return `<span class="breakdown-yoy-heat" style="color:${C.azulEscuro};">n.a.</span>`;
    const rounded = Number(value.toFixed(1));
    const color = rounded < 0 ? '#8F1028' : rounded > 0 ? '#007A68' : C.azulEscuro;
    return `<span class="breakdown-yoy-heat" style="color:${color};">${msFmtPct(rounded, 1)}</span>`;
}

function msAllBrandNames() {
    const brands = msData().brands || {};
    return Array.from(new Set([
        ...Object.keys(brands.total || {}),
        ...Object.keys(brands.apparel || {}),
        ...Object.keys(brands.footwear || {})
    ])).sort((a, b) => a.localeCompare(b));
}

function msBrandMembers(brand) {
    return brand === 'Vulcabras' ? MS_VULCABRAS : [brand];
}

function msBrandCategorySeries(category, brand) {
    const d = msData();
    const categoryBrands = d.brands?.[category] || {};
    const members = msBrandMembers(brand);
    return (d.years || []).map((_, index) => members.reduce((sum, member) => {
        const value = categoryBrands[member]?.[index];
        return sum + (Number.isFinite(value) ? Number(value) : 0);
    }, 0));
}

function getMarketShareBrandGmvModel(state = MS_BRAND_GMV_CHART_STATE) {
    const d = msData();
    const years = d.years || [];
    if (!years.length) return null;
    let fromIdx = years.indexOf(state.from), toIdx = years.indexOf(state.to);
    if (fromIdx < 0) fromIdx = 0;
    if (toIdx < 0) toIdx = years.length - 1;
    if (fromIdx > toIdx) [fromIdx, toIdx] = [toIdx, fromIdx];
    const apparelMn = msBrandCategorySeries('apparel', state.brand);
    const footwearMn = msBrandCategorySeries('footwear', state.brand);
    const totalMn = years.map((_, index) => apparelMn[index] + footwearMn[index]);
    const shownYears = years.slice(fromIdx, toIdx + 1);
    const sliceBn = values => values.slice(fromIdx, toIdx + 1).map(value => value / 1000);
    return {
        brand: state.brand,
        years: shownYears,
        values: sliceBn(totalMn),
        stackedSeries: [
            { key: 'footwear', label: 'Footwear', color: C.azulEscuro, values: sliceBn(footwearMn) },
            { key: 'apparel', label: 'Apparel', color: C.turquesa, values: sliceBn(apparelMn) }
        ],
        yoy: msYoySeries(totalMn).slice(fromIdx, toIdx + 1),
        cagr: msCagr(totalMn[fromIdx], totalMn[toIdx], toIdx - fromIdx),
        apparelCagr: msCagr(apparelMn[fromIdx], apparelMn[toIdx], toIdx - fromIdx),
        footwearCagr: msCagr(footwearMn[fromIdx], footwearMn[toIdx], toIdx - fromIdx),
        lineColor: C.cereja
    };
}

function marketShareBrandGmvControlsHtml(prefix = 'ms-brand-gmv', state = MS_BRAND_GMV_CHART_STATE) {
    const years = msData().years || [];

function buildMarketShareBrandGmvChart(canvas, selected) {
    if (!canvas || !selected) return null;
    const labels = selected.years;
    const yoyData = selected.yoy;
    const lineColor = selected.lineColor || C.cereja;
    const barData = selected.values;
    const barMax = Math.max(...barData, 0.1) * 1.18;
    const yoyValues = yoyData.filter(Number.isFinite);
    const yoyObservedMax = Math.max(...yoyValues, 0);
    const yoyObservedMin = Math.min(...yoyValues, 0);
    const yoyRange = Math.max(10, yoyObservedMax - yoyObservedMin);
    const yoyScaleMax = Math.ceil(yoyObservedMax + Math.max(4, yoyRange * 0.08));
    const yoyScaleMin = Math.floor(yoyObservedMin - Math.max(4, yoyRange * 0.10));
    const datasets = [];
    selected.stackedSeries.forEach(s => datasets.push({
        type: 'bar', label: s.label, data: s.values, stack: 'brand-gmv', yAxisID: 'y', order: 2,
        backgroundColor: s.color, borderColor: s.color, borderWidth: 0, borderSkipped: false,
        barPercentage: 0.74, categoryPercentage: 0.88
    }));
    datasets.push({
        type: 'line', label: 'YoY', data: yoyData, yAxisID: 'y1', order: 1,
        borderColor: lineColor, backgroundColor: lineColor, borderWidth: 2.5,
        pointRadius: 3, pointBackgroundColor: lineColor, pointBorderColor: lineColor,
        pointHoverRadius: 5, pointHitRadius: 18, tension: 0.25
    });
    const labelPlugin = {
        id: 'msBrandGmvLabels',
        afterDatasetsDraw(chart) {
            const { ctx, chartArea } = chart;
            const lineIndex = chart.data.datasets.findIndex(ds => ds.type === 'line');
            const lineMeta = lineIndex >= 0 ? chart.getDatasetMeta(lineIndex) : null;
            const lineVisible = lineIndex >= 0 && chart.isDatasetVisible(lineIndex);
            const yoyBoxes = [];
            const barInfos = [];
            chart.data.datasets.forEach((ds, idx) => {
                if (ds.type === 'bar' && chart.isDatasetVisible(idx)) barInfos.push({ meta: chart.getDatasetMeta(idx), data: ds.data });
            });
            const stackTops = labels.map((_, index) => {
                let topY = null, barRef = null, sum = 0;
                barInfos.forEach(info => {
                    const bar = info.meta.data[index];
                    if (!bar) return;
                    if (topY === null || bar.y < topY) { topY = bar.y; barRef = bar; }
                    const val = info.data[index];
                    if (Number.isFinite(val)) sum += val;
                });
                return { topY, barRef, sum };
            });
            ctx.save();
            ctx.font = '700 11px Verdana';
            if (lineMeta && lineVisible) lineMeta.data.forEach((point, index) => {
                const value = yoyData[index];
                if (!point || !Number.isFinite(value)) return;
                const text = `${Math.round(value)}%`;
                const width = ctx.measureText(text).width + 14;
                const height = 22;
                let x = point.x - width / 2;
                let y = point.y - height / 2;
                x = Math.max(chartArea.left + 2, Math.min(x, chartArea.right - width - 2));
                y = Math.max(chartArea.top + 4, y);
                yoyBoxes[index] = { x, y, width, height };
            });
            ctx.restore();
            ctx.save();
            ctx.font = '700 12px Verdana';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = C.branco;
            chart.data.datasets.forEach((ds, idx) => {
                if (ds.type !== 'bar' || !chart.isDatasetVisible(idx)) return;
                const meta = chart.getDatasetMeta(idx);
                meta.data.forEach((bar, i) => {
                    const value = ds.data[i];
                    if (!bar || !Number.isFinite(value) || value <= 0) return;
                    const segHeight = Math.abs(bar.base - bar.y);
                    if (segHeight < 18) return;
                    const labelX = bar.x;
                    let labelY = bar.y + (bar.base - bar.y) / 2;
                    const segTotal = stackTops[i] ? stackTops[i].sum : 0;
                    const text = segTotal > 0 ? `${Math.round((value / segTotal) * 100)}%` : '';
                    const box = yoyBoxes[i];
                    if (box) {
                        const tw = ctx.measureText(text).width;
                        const overlapsX = Math.abs(labelX - (box.x + box.width / 2)) < ((tw + box.width) / 2);
                        const overlapsY = Math.abs(labelY - (box.y + box.height / 2)) < ((16 + box.height) / 2);
                        if (overlapsX && overlapsY) {
                            const segTop = Math.min(bar.y, bar.base), segBottom = Math.max(bar.y, bar.base);
                            const candDown = box.y + box.height + 9, candUp = box.y - 9;
                            if ((box.y + box.height / 2) <= labelY && candDown + 8 <= segBottom - 2) labelY = candDown;
                            else if (candUp - 8 >= segTop + 2) labelY = candUp;
                            else if (candDown + 8 <= segBottom - 2) labelY = candDown;
                            labelY = Math.max(segTop + 10, Math.min(segBottom - 10, labelY));
                        }
                    }
                    ctx.fillText(text, labelX, labelY);
                });
            });
            ctx.fillStyle = C.azulEscuro;
            stackTops.forEach((stack, index) => {
                if (!stack || stack.topY == null || !stack.barRef || stack.sum <= 0) return;
                const text = fmtNumberEN(stack.sum, 1);
                let labelX = stack.barRef.x;
                let labelY = Math.max(chartArea.top + 9, stack.topY - 12);
                const box = yoyBoxes[index];
                if (box) {
                    const tw = ctx.measureText(text).width;
                    const overlapsX = Math.abs(labelX - (box.x + box.width / 2)) < ((tw + box.width) / 2);
                    const overlapsY = Math.abs(labelY - (box.y + box.height / 2)) < ((14 + box.height) / 2);
                    if (overlapsX && overlapsY) labelY = Math.max(chartArea.top + 9, box.y - 11);
                }
                ctx.fillText(text, labelX, labelY);
            });
            ctx.font = '700 11px Verdana';
            ctx.textBaseline = 'middle';
            if (lineMeta && lineVisible) lineMeta.data.forEach((point, index) => {
                const value = yoyData[index];
                if (!point || !Number.isFinite(value)) return;
                const text = `${Math.round(value)}%`;
                const width = ctx.measureText(text).width + 14;
                const height = 22;
                const box = yoyBoxes[index] || { x: Math.max(chartArea.left + 2, Math.min(point.x - width / 2, chartArea.right - width - 2)), y: Math.max(chartArea.top + 4, point.y - 11) };
                ctx.fillStyle = lineColor;
                roundedRect(ctx, box.x, box.y, width, height, 4);
                ctx.fill();
                ctx.fillStyle = C.branco;
                ctx.fillText(text, box.x + width / 2, box.y + height / 2 + 0.5);
            });
            ctx.restore();
        }
    };
    return new Chart(canvas.getContext('2d'), {
        type: 'bar', plugins: [labelPlugin], data: { labels, datasets },
        options: {
            responsive: true, maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            layout: { padding: { top: 52, right: 26, left: 0, bottom: 0 } },
            plugins: {
                legend: { display: false },
                tooltip: {
                    backgroundColor: 'rgba(2,28,69,0.94)', titleColor: '#9AA8BB', bodyColor: '#FFFFFF',
                    borderColor: '#344F75', borderWidth: 1, cornerRadius: 8, padding: 12,
                    callbacks: {
                        label(ctx2) {
                            const v = ctx2.parsed.y;
                            if (ctx2.dataset.yAxisID === 'y1') return v == null ? '' : `  YoY: ${tamFmtPct(v, 1)}`;
                            return `  ${ctx2.dataset.label}: R$ ${fmtNumberEN(v, 1)} bn`;
                        },
                        footer(items) {
                            const total = items.filter(c => c.dataset.yAxisID !== 'y1').reduce((sum, c) => sum + (Number.isFinite(c.parsed.y) ? c.parsed.y : 0), 0);
                            return total ? `  Total: R$ ${fmtNumberEN(total, 1)} bn` : '';
                        }
                    }
                }
            },
            scales: {
                x: { stacked: true, ticks: { color: C.azulEscuro40, font: { family: 'Verdana', size: 10.5 }, minRotation: 0, maxRotation: 0 }, grid: { display: false }, border: { color: C.azulEscuro20 } },
                y: { stacked: true, min: 0, max: barMax, ticks: { display: false }, grid: { display: false }, border: { display: false } },
                y1: { position: 'right', min: yoyScaleMin, max: yoyScaleMax, ticks: { display: false }, grid: { display: false, drawOnChartArea: false }, border: { display: false } }
            }
        }
    });
}

function buildMarketShareChart(canvas, model) {
    if (!canvas || !model) return null;
    const labels = model.years.map(String);
    const datasets = model.series.map(s => ({ label: s.label, data: s.data, backgroundColor: s.color, borderColor: s.color, borderWidth: 0, borderSkipped: false, stack: 'ms', barPercentage: 0.86, categoryPercentage: 0.9 }));
    const labelPlugin = {
        id: 'msLabels',
        afterDatasetsDraw(chart) {
            const { ctx } = chart;
            ctx.save();
            ctx.font = '700 11px Verdana';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = '#FFFFFF';
            chart.data.datasets.forEach((ds, di) => {
                if (!chart.isDatasetVisible(di)) return;
                const meta = chart.getDatasetMeta(di);
                meta.data.forEach((bar, i) => {
                    const v = ds.data[i];
                    if (!Number.isFinite(v) || v < 0.5 || Math.abs(bar.base - bar.y) < 14) return;
                    ctx.fillText(tamFmtPct(v, 1), bar.x, (bar.y + bar.base) / 2);
                });
            });
            ctx.restore();
        }
    };
    return new Chart(canvas.getContext('2d'), {
        type: 'bar', plugins: [labelPlugin], data: { labels, datasets },
        options: {
            responsive: true, maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            layout: { padding: { top: 22, right: 20, left: 0, bottom: 0 } },
            plugins: {
                legend: { display: false },
                tooltip: { backgroundColor: 'rgba(2,28,69,0.94)', titleColor: '#9AA8BB', bodyColor: '#FFFFFF', borderColor: '#344F75', borderWidth: 1, cornerRadius: 8, padding: 12, callbacks: { label: c => `  ${c.dataset.label}: ${tamFmtPct(c.parsed.y, 1)}` } }
            },
            scales: {
                x: { stacked: true, ticks: { color: C.azulEscuro40, font: { family: 'Verdana', size: 10.5 }, minRotation: 0, maxRotation: 0 }, grid: { display: false }, border: { color: C.azulEscuro20 } },
                y: { stacked: true, min: 0, max: 100, ticks: { display: false }, grid: { display: false }, border: { display: false } }
            }
        }
    });
}

function marketShareTableInner() {
    const model = getMarketShareModel();
    if (!model) return '';
    const d = msData();
    const denominator = msDenominatorSeries(MS_STATE.category, MS_STATE.shareBasis);
    const totalSeries = model.years.map(year => {
        const idx = (d.years || []).indexOf(year);
        return idx >= 0 ? Number(denominator[idx] || 0) : 0;
    });
    const totalYoy = msYoySeries(totalSeries);
    const rows = model.series.map(series => {
        const values = series.data.map((share, idx) => totalSeries[idx] * share / 100);
        return { ...series, values, yoy: msYoySeries(values), shares: series.data };
    });
    const side = (values, shares, isTotal = false) => {
        const cagrValue = msCagr(values[0], values[values.length - 1], values.length - 1);
        const deltaPp = shares && shares.length ? shares[shares.length - 1] - shares[0] : null;
        return {
            cagrText: cagrValue == null ? 'n.a.' : msFmtPct(cagrValue, 1),
            varText: isTotal || deltaPp == null ? null : msFmtPp(deltaPp, 1),
            varClass: deltaPp > 0 ? 'pos' : deltaPp < 0 ? 'neg' : 'neu'
        };
    };
    const sideCell = sideInfo => `<td class="breakdown-side-cell">
        <div class="breakdown-cell-main">${sideInfo.cagrText}</div>
        <div class="breakdown-cell-sub breakdown-sidebox-empty">-</div>
        ${sideInfo.varText ? `<div class="breakdown-cell-sub"><span class="breakdown-sidebox-pp ${sideInfo.varClass}">${sideInfo.varText}</span></div>` : `<div class="breakdown-cell-sub breakdown-sidebox-empty">-</div>`}
    </td>`;
    const yearHeads = model.years.map(year => `<th class="breakdown-year-head">${year}</th>`).join('');
    const totalCells = totalSeries.map((value, idx) => `<td class="breakdown-year-cell">
        <div class="breakdown-total-band"><div class="breakdown-cell-main">${fmtNumberEN(value / 1000, 1)}</div></div>
        <div class="breakdown-cell-sub">${msYoyHeatText(totalYoy[idx])}</div>
    </td>`).join('');
    const rowHtml = rows.map((row, rowIdx) => `<tr class="breakdown-brand-row">
        <td class="breakdown-sticky">
            <div class="breakdown-row-title">${rowIdx + 1}. ${row.label}</div>
            <div class="breakdown-row-sub">YoY (%)</div>
            <div class="breakdown-row-sub">Market Share</div>
        </td>
        ${row.values.map((value, idx) => `<td class="breakdown-year-cell">
            <div class="breakdown-cell-main">${fmtNumberEN(value / 1000, 1)}</div>
            <div class="breakdown-cell-sub">${msYoyHeatText(row.yoy[idx])}</div>
            <div class="breakdown-cell-sub">${msFmtPct(row.shares[idx], 1)}</div>
        </td>`).join('')}
        <td class="breakdown-gap-cell"></td>
        ${sideCell(side(row.values, row.shares))}
    </tr>`).join('');
    const header = `<div style="display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap;width:100%;margin-bottom:16px;">
        <div><h3 style="color:${C.azulEscuro};font-size:15px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;margin:0 0 4px 0;">GMV Breakdown by Brand</h3>
        <p style="color:${C.azulEscuro60};font-size:12px;margin:0;">(BRL bn, Percentage)</p></div>
        ${marketShareControlsHtml('ms-table')}</div>`;
    return `${header}<div class="breakdown-scroll"><table class="breakdown-table">
        <thead><tr><th class="breakdown-sticky"></th>${yearHeads}<th class="breakdown-gap-head"></th><th class="breakdown-side-head">CAGR or Var</th></tr></thead>
        <tbody>
            <tr class="breakdown-total-row">
                <td class="breakdown-sticky"><div class="breakdown-total-label-band"><div class="breakdown-row-title">${MS_STATE.shareBasis === 'named' ? 'Adjusted GMV' : 'GMV'}</div></div><div class="breakdown-total-yoy-label">YoY (%)</div></td>
                ${totalCells}
                <td class="breakdown-gap-cell"></td>
                ${sideCell(side(totalSeries, null, true))}
            </tr>
            ${rowHtml}
        </tbody>
    </table></div>`;
}

function bindMarketShareLegend(chart) {
    if (!chart) return;
    const sync = () => document.querySelectorAll('#market-share-card .chart-legend-item[data-dataset-index]').forEach(it => it.classList.toggle('is-hidden', !chart.isDatasetVisible(Number(it.dataset.datasetIndex))));
    document.querySelectorAll('#market-share-card .chart-legend-item[data-dataset-index]').forEach(item => {
        const toggle = () => { const idx = Number(item.dataset.datasetIndex); chart.setDatasetVisibility(idx, !chart.isDatasetVisible(idx)); chart.update(); sync(); };
        item.addEventListener('click', toggle);
        item.addEventListener('keydown', e => { if (e.key !== 'Enter' && e.key !== ' ') return; e.preventDefault(); toggle(); });
    });
    sync();
}

function cagedSourceRows() {
    return (window.VULCABRAS_CAGED_DATA && window.VULCABRAS_CAGED_DATA.rows ? window.VULCABRAS_CAGED_DATA.rows : [])
        .filter(row => row.scope === 'Total')
        .map(row => ({
            key: periodKey(row.year, row.month),
            year: Number(row.year),
            month: Number(row.month),
            label: monthLabel(Number(row.year), Number(row.month)),
            admissions: Number(row.admissions || 0),
            separations: Number(row.separations || 0),
            net: Number(row.net || 0),
        }))
        .sort((a, b) => a.key.localeCompare(b.key));
}

function cagedSumRows(rows, template) {
    const admissions = rows.reduce((sum, row) => sum + row.admissions, 0);
    const separations = rows.reduce((sum, row) => sum + row.separations, 0);
    return { ...template, admissions, separations, net: admissions - separations };
}

function cagedMonthlyRows() {
    const rows = cagedSourceRows();
    if (cagedState.base !== 'ltm' || cagedState.grain === 'annual') return rows;
    const out = [];
    for (let i = 11; i < rows.length; i++) {
        const windowRows = rows.slice(i - 11, i + 1);
        out.push(cagedSumRows(windowRows, rows[i]));
    }
    return out;
}

function cagedQuarterlyRows() {
    const rows = cagedSourceRows();
    const groups = new Map();
    rows.forEach(row => {
        const q = quarterOf(row.month);
        const key = `${row.year}-Q${q}`;
        if (!groups.has(key)) groups.set(key, { key, year: row.year, quarter: q, label: quarterLabel(row.year, q), rows: [] });
        groups.get(key).rows.push(row);
    });
    let quarters = Array.from(groups.values())
        .filter(group => group.rows.length === 3)
        .sort((a, b) => a.key.localeCompare(b.key))
        .map(group => cagedSumRows(group.rows, { key: group.key, year: group.year, quarter: group.quarter, label: group.label }));
    if (cagedState.base !== 'ltm') return quarters;
    const out = [];
    for (let i = 3; i < quarters.length; i++) {
        const windowRows = quarters.slice(i - 3, i + 1);
        out.push(cagedSumRows(windowRows, quarters[i]));
    }
    return out;
}

function cagedAnnualRows() {
    const rows = cagedSourceRows();
    const groups = new Map();
    rows.forEach(row => {
        const key = String(row.year);
        if (!groups.has(key)) groups.set(key, { key, year: row.year, label: key, rows: [] });
        groups.get(key).rows.push(row);
    });
    return Array.from(groups.values())
        .filter(group => group.rows.length === 12)
        .sort((a, b) => a.key.localeCompare(b.key))
        .map(group => cagedSumRows(group.rows, { key: group.key, year: group.year, label: group.label }));
}

function cagedPeriodRows() {
    if (cagedState.grain === 'quarterly') return cagedQuarterlyRows();
    if (cagedState.grain === 'annual') return cagedAnnualRows();
    return cagedMonthlyRows();
}

function cagedPeriodKeyForCurrentGrain(date) {
    if (!date || !Number.isFinite(date.year) || !Number.isFinite(date.month)) return null;
    if (cagedState.grain === 'monthly') return periodKey(date.year, date.month);
    if (cagedState.grain === 'quarterly') return `${date.year}-Q${quarterOf(date.month)}`;
    return String(date.year);
}

function ensureCagedRange() {
    if (cagedState.grain === 'annual') cagedState.base = 'spot';
    const rows = cagedPeriodRows();
    if (!rows.length) return;
    const keys = rows.map(row => row.key);
    if (!cagedState.from || !keys.includes(cagedState.from)) cagedState.from = keys[Math.max(0, keys.length - 24)];
    if (!cagedState.to || !keys.includes(cagedState.to)) cagedState.to = keys[keys.length - 1];
    if (keys.indexOf(cagedState.from) > keys.indexOf(cagedState.to)) [cagedState.from, cagedState.to] = [cagedState.to, cagedState.from];
}

function cagedSelectedRows() {
    ensureCagedRange();
    return cagedPeriodRows().filter(row => row.key >= cagedState.from && row.key <= cagedState.to);
}

function cagedJobsMonthlyRows() {
    let jobs = CAGED_RAIS_2019_BASE;
    const monthly = cagedSourceRows().map(row => {
        jobs += row.net;
        return { key: row.key, year: row.year, month: row.month, label: row.label, value: jobs };
    });
    const byKey = new Map(monthly.map(row => [row.key, row]));
    return monthly.map(row => {
        const prev = byKey.get(periodKey(row.year - 1, row.month));
        return {
            ...row,
            yoy: prev && prev.value ? (row.value / prev.value - 1) * 100 : null
        };
    });
}

function cagedJobsAverage(rows, template) {
    const value = rows.reduce((sum, row) => sum + row.value, 0) / rows.length;
    return { ...template, value };
}

function cagedJobsQuarterlyRows() {
    const groups = new Map();
    cagedJobsMonthlyRows().forEach(row => {
        const q = quarterOf(row.month);
        const key = `${row.year}-Q${q}`;
        if (!groups.has(key)) groups.set(key, { key, year: row.year, quarter: q, label: quarterLabel(row.year, q), rows: [] });
        groups.get(key).rows.push(row);
    });
    const quarters = Array.from(groups.values())
        .filter(group => group.rows.length === 3)
        .sort((a, b) => a.key.localeCompare(b.key))
        .map(group => cagedJobsAverage(group.rows, { key: group.key, year: group.year, quarter: group.quarter, label: group.label }));
    const byKey = new Map(quarters.map(row => [row.key, row]));
    return quarters.map(row => {
        const prev = byKey.get(`${row.year - 1}-Q${row.quarter}`);
        return { ...row, yoy: prev && prev.value ? (row.value / prev.value - 1) * 100 : null };
    });
}

function cagedJobsAnnualRows() {
    const groups = new Map();
    cagedJobsMonthlyRows().forEach(row => {
        const key = String(row.year);
        if (!groups.has(key)) groups.set(key, { key, year: row.year, label: key, rows: [] });
        groups.get(key).rows.push(row);
    });
    const years = Array.from(groups.values())
        .filter(group => group.rows.length === 12)
        .sort((a, b) => a.key.localeCompare(b.key))
        .map(group => cagedJobsAverage(group.rows, { key: group.key, year: group.year, label: group.label }));
    const byKey = new Map(years.map(row => [row.key, row]));
    return years.map(row => {
        const prev = byKey.get(String(row.year - 1));
        return { ...row, yoy: prev && prev.value ? (row.value / prev.value - 1) * 100 : null };
    });
}
