name: Pipeline Calçados Esportivos

on:
  schedule:
    - cron: '0 10 * * *'   # 10:00 UTC = 07:00 BRT (UTC-3)
  workflow_dispatch:        # permite rodar manualmente no GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Configurar credenciais GCP
        run: |
          echo '${{ secrets.GCP_CREDENTIALS }}' > /tmp/gcp_creds.json
        # Nota: o arquivo é criado em /tmp e apagado ao fim do runner

      - name: Rodar pipeline
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp_creds.json
          PYTHONIOENCODING: utf-8
        run: python pipeline_adidas_nike_bq.py
