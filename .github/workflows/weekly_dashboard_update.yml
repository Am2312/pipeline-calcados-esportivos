name: Weekly Dashboard Update

on:
  schedule:
    - cron: '0 13 * * 1'   # Every Monday at 13:00 UTC (10:00 BRT, UTC-3)
  workflow_dispatch:        # Manual trigger via GitHub UI

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure GCP credentials
        run: echo '${{ secrets.GCP_CREDENTIALS }}' > /tmp/gcp_creds.json

      - name: Run dashboard update
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp_creds.json
          PYTHONIOENCODING: utf-8
        run: python update_dashboard_js.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/calcados-price-data.js docs/calcados-disc-data.js
          if git diff --staged --quiet; then
            echo "No changes to commit — data already up to date."
          else
            WEEK=$(date -d 'last sunday' '+%Y-%m-%d' 2>/dev/null || date -v-sun '+%Y-%m-%d')
            git commit -m "data: update dashboard JS — week ${WEEK}"
            git push
          fi
